<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رابطہ کریں | ید اللہ ڈیجیٹل ہب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4361ee;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Poppins', 'Noto Nastaliq Urdu', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .contact-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 10px;
            font-family: 'Noto Nastaliq Urdu';
        }

        .form-group {
            text-align: right;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-family: 'Poppins', 'Noto Nastaliq Urdu', sans-serif;
            background: white;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-family: 'Noto Nastaliq Urdu';
        }

        .send-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            margin-top: 15px;
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="contact-container">
    <h1>رابطہ کریں</h1>
    <p>آپ کے پیغامات ہمارے لیے اہم ہیں۔</p>

    <!-- ڈراپ ڈاؤن (Contact / Complaint) -->
    <div class="form-group">
        <label for="msgType">میں چاہتا ہوں:</label>
        <select id="msgType">
            <option value="contact" selected>رابطہ کریں</option>
            <option value="complaint">شکایت درج کروائیں</option>
        </select>
    </div>

    <!-- اصل فارم جو FormSubmit کو ڈیٹا بھیجے گا -->
    <form id="contactForm" action="https://formsubmit.co/ullahyad199@gmail.com" method="POST">
        <!-- FormSubmit کے لیے ضروری ہڈن فیلڈز -->
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="thankyou.html"> <!-- یہ thankyou.html کی طرف لے جائے گا -->

        <div class="form-group">
            <label>آپ کا نام</label>
            <input type="text" name="name" placeholder="نام لکھیں..." required>
        </div>

        <div class="form-group">
            <label>آپ کا ای میل</label>
            <input type="email" name="email" placeholder="example@domain.com" required>
        </div>

        <div class="form-group" id="subjectDiv">
            <label>عنوان</label>
            <input type="text" name="subject" id="subjectInput" placeholder="رابطہ کا عنوان" required>
        </div>

        <div class="form-group">
            <label>پیغام</label>
            <textarea name="message" rows="4" placeholder="آپ کیا کہنا چاہتے ہیں؟" required></textarea>
        </div>

        <button type="submit" class="send-btn">بھیجیں</button>
    </form>

    <a href="index.html" class="back-link">← واپس ہوم پیج پر جائیں</a>
</div>

<!-- جاوا اسکرپٹ: ڈراپ ڈاؤن کی بنیاد پر سبجیکٹ خودکار کریں -->
<script>
    const msgType = document.getElementById('msgType');
    const subjectInput = document.getElementById('subjectInput');

    function updateSubject() {
        if (msgType.value === 'contact') {
            subjectInput.placeholder = "رابطہ کا عنوان (مثلاً: تعاون کا سوال)";
            if (!subjectInput.value.startsWith('رابطہ:')) {
                subjectInput.value = 'رابطہ: ';
            }
        } else {
            subjectInput.placeholder = "شکایت کا عنوان (مثلاً: پروڈکٹ کا مسئلہ)";
            if (!subjectInput.value.startsWith('شکایت:')) {
                subjectInput.value = 'شکایت: ';
            }
        }
    }

    // جب صفحہ لوڈ ہو اور جب ڈراپ ڈاؤن تبدیل ہو
    msgType.addEventListener('change', updateSubject);
    window.addEventListener('load', updateSubject);
</script>

<!-- اہم: فارم کو چالو کرنے کے لیے اپنے ایلال میں آئے ایکٹیویشن لنک پر کلک کرنا نہ بھولیں -->
</body>
</html>
