<!-- Replace the entire <div id="google_translate_element"></div> with this: -->

<div class="language-selector-wrapper">
  <button class="lang-btn" id="langDropdownBtn">
    <i class="fas fa-globe"></i> <span id="selectedLangDisplay">Select Language</span> <i class="fas fa-chevron-down"></i>
  </button>
  <div class="lang-dropdown" id="langDropdown">
    <div class="lang-search">
      <i class="fas fa-search"></i>
      <input type="text" id="langSearch" placeholder="Search language..." autocomplete="off">
    </div>
    <div class="lang-list" id="langList"></div>
  </div>
</div>

<!-- Add this CSS to your <style> section -->
<style>
  /* Custom Language Selector */
  .language-selector-wrapper {
    position: relative;
    display: inline-block;
    font-family: 'Amiri', serif;
    min-width: 260px;
  }
  .lang-btn {
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid var(--border-soft);
    border-radius: 40px;
    color: var(--text-light);
    padding: 8px 18px;
    width: 100%;
    text-align: right;
    cursor: pointer;
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
    font-size: 0.95rem;
  }
  .lang-btn i:first-child {
    color: var(--primary-gold);
    margin-left: auto;
  }
  .lang-btn i:last-child {
    margin-right: auto;
    font-size: 0.8rem;
    opacity: 0.8;
  }
  .lang-btn:hover {
    border-color: var(--primary-gold);
    box-shadow: 0 0 12px var(--primary-glow);
    background: rgba(20, 30, 50, 0.9);
  }
  .lang-dropdown {
    position: absolute;
    top: calc(100% + 5px);
    left: 0;
    right: 0;
    background: rgba(10, 16, 32, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 10px;
    display: none;
    z-index: 2000;
    max-height: 350px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
  }
  .lang-dropdown.show {
    display: block;
  }
  .lang-search {
    position: relative;
    margin-bottom: 8px;
  }
  .lang-search i {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--primary-gold);
    font-size: 0.9rem;
  }
  .lang-search input {
    width: 100%;
    padding: 10px 35px 10px 12px;
    border: 1px solid var(--border-soft);
    border-radius: 30px;
    background: rgba(0, 0, 0, 0.4);
    color: white;
    font-family: 'Amiri', serif;
    font-size: 0.9rem;
  }
  .lang-search input:focus {
    outline: none;
    border-color: var(--primary-gold);
    background: rgba(10, 15, 30, 0.8);
  }
  .lang-list {
    max-height: 250px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--primary-gold) #1a1f2f;
  }
  .lang-list::-webkit-scrollbar {
    width: 5px;
  }
  .lang-list::-webkit-scrollbar-track {
    background: #1a1f2f;
    border-radius: 10px;
  }
  .lang-list::-webkit-scrollbar-thumb {
    background: var(--primary-gold);
    border-radius: 10px;
  }
  .lang-item {
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 30px;
    transition: var(--transition);
    color: var(--text-dim);
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lang-item:hover {
    background: rgba(229, 192, 92, 0.15);
    color: var(--primary-gold);
  }
  .lang-item.selected {
    background: rgba(229, 192, 92, 0.25);
    color: var(--primary-gold);
    font-weight: 700;
  }
  @media (max-width: 700px) {
    .language-selector-wrapper {
      width: 100%;
      min-width: auto;
    }
    .lang-dropdown {
      max-height: 300px;
    }
  }
</style>

      { name: 'Yiddish', code: 'yi' },
      { name: 'Yoruba', code: 'yo' },
      { name: 'Zulu', code: 'zu' }
    ];

    // Sort languages by name
    languages.sort((a, b) => a.name.localeCompare(b.name));

    // Get cookie value
    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? decodeURIComponent(match[2]) : null;
    }

    // Set cookie (domain/path)
    function setCookie(name, value, days = 365) {
      const d = new Date();
      d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/";
    }

    // Get current language code from cookie (if any)
    function getCurrentLangCode() {
      const transCookie = getCookie('googtrans');
      if (transCookie) {
        // Cookie format: "/ur/en" or "/en/ur"? Actually it's "/auto/en" or "/ur/en"?
        // Google Translate sets cookie like "googtrans=/ur/en" for target language.
        const match = transCookie.match(/\/([a-z]{2,3}(-[A-Z]{2,3})?)$/);
        return match ? match[1] : null;
      }
      return null;
    }

    // Display current language name in button
    function updateSelectedLanguage() {
      const currentCode = getCurrentLangCode();
      const lang = languages.find(l => l.code === currentCode);
      document.getElementById('selectedLangDisplay').innerText = lang ? lang.name : 'Select Language';
    }

    // Render language list
    function renderLanguageList(filter = '') {
      const listEl = document.getElementById('langList');
      const filterLower = filter.toLowerCase();
      const filtered = languages.filter(l => l.name.toLowerCase().includes(filterLower));
      const currentCode = getCurrentLangCode();

      listEl.innerHTML = filtered.map(l => `
        <div class="lang-item ${l.code === currentCode ? 'selected' : ''}" data-code="${l.code}">${l.name}</div>
      `).join('');

      // Attach click handlers
      document.querySelectorAll('.lang-item').forEach(item => {
        item.addEventListener('click', function(e) {
          const code = this.dataset.code;
          // Set cookie: googtrans=/ur/xx  (ur is source language, xx is target)
          setCookie('googtrans', '/ur/' + code);
          // Reload to apply translation
          location.reload();
        });
      });
    }

    // Dropdown toggle
    const btn = document.getElementById('langDropdownBtn');
    const dropdown = document.getElementById('langDropdown');
    const searchInput = document.getElementById('langSearch');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('show');
      if (dropdown.classList.contains('show')) {
        searchInput.focus();
        renderLanguageList(searchInput.value);
      }
    });

    // Search filter
    searchInput.addEventListener('input', () => {
      renderLanguageList(searchInput.value);
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target) && !btn.contains(e.target)) {
        dropdown.classList.remove('show');
      }
    });

    // Initialize
    updateSelectedLanguage();
    renderLanguageList();
  })();
</script>
