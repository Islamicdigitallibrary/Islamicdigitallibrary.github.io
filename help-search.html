<style>
  /* ===== ROOT VARIABLES ===== */
  :root {
    --bg-deep: #0a1020;
    --primary-gold: #e5c05c;
    --primary-glow: rgba(229, 192, 92, 0.25);
    --glass-bg: rgba(15, 25, 40, 0.6);
    --border-soft: rgba(229, 192, 92, 0.2);
    --text-light: #ffffff;
    --text-dim: #b0bcd0;
    --card-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.6);
    --transition: all 0.25s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
    background-color: var(--bg-deep);
    color: var(--text-light);
    padding-top: 140px;
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(229,192,92,0.06), transparent 30%),
      radial-gradient(circle at 90% 70%, rgba(229,192,92,0.06), transparent 30%);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* --- GOOGLE TRANSLATE CUSTOM CSS --- */
  body { top: 0 !important; }
  .skiptranslate iframe { display: none !important; }
  #goog-gt-tt, .goog-te-banner-frame { display: none !important; }
  .goog-text-highlight { background: transparent !important; box-shadow: none !important; }
  
  /* ترجمہ والے بٹن کا ڈیزائن (اب یہ اسکرول ہو گا) */
  #google_translate_element select {
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid var(--border-soft);
    border-radius: 40px;
    color: var(--text-light);
    padding: 8px 18px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    font-family: 'Amiri', serif;
    font-size: 0.95rem;
    outline: none;
    transition: var(--transition);
    /* اسکرول کے لیے اضافی خصوصیات (جاوا اسکرپٹ سے size سیٹ ہو گا) */
    max-height: 200px;
    overflow-y: auto;
  }
  #google_translate_element select:hover {
    border-color: var(--primary-gold);
    box-shadow: 0 0 12px var(--primary-glow);
  }
  #google_translate_element select option {
    background: #0a1020;
    color: white;
    padding: 6px;
  }
  .goog-logo-link { display: none !important; }
  .goog-te-gadget { color: transparent !important; }

  /* --- FIXED HEADER (بالکل ویسا ہی، بلیک) --- */
  .fixed-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    background: rgba(10, 16, 32, 0.9);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-soft);
    padding: 12px 0 8px 0;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    max-width: 1400px;
    margin: 0 auto;
    flex-wrap: wrap;
    gap: 10px;
  }

  .logo {
    font-size: 1.6rem;
    color: var(--primary-gold);
    font-weight: 700;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
  }
  .logo i {
    font-size: 1.8rem;
    color: #f5d97a;
  }

  /* سرچ بار */
  .search-container {
    max-width: 900px;
    margin: 12px auto 8px;
    padding: 0 20px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    right: 35px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--primary-gold);
    font-size: 1.1rem;
    pointer-events: none;
    z-index: 2;
  }
  .clear-icon {
    position: absolute;
    left: 35px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    cursor: pointer;
    display: none;
    padding: 8px;
    z-index: 2;
    transition: var(--transition);
    border-radius: 50%;
  }
  .clear-icon:hover {
    color: var(--primary-gold);
    background: rgba(255,255,255,0.05);
  }

  #searchInput {
    width: 100%;
    padding: 16px 50px 16px 50px;
    border: 1px solid var(--border-soft);
    border-radius: 50px;
    background: rgba(0, 0, 0, 0.4);
    color: white;
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    transition: var(--transition);
    box-shadow: inset 0 3px 10px rgba(0,0,0,0.3), 0 0 0px var(--primary-glow);
    backdrop-filter: blur(5px);
  }
  #searchInput:focus {
    outline: none;
    border-color: var(--primary-gold);
    background: rgba(10, 15, 30, 0.8);
    box-shadow: 0 0 20px var(--primary-glow), inset 0 2px 8px black;
  }
  #searchInput::placeholder {
    color: #95a5b3;
    font-size: 1rem;
  }

  /* شماریات بار */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    max-width: 1200px;
    margin: 10px auto 0;
    padding: 0 20px;
    font-size: 1rem;
    color: var(--text-dim);
    font-family: 'Amiri';
    flex-wrap: wrap;
  }
  #loadingStatus i, #totalCount i {
    margin-left: 5px;
  }

  /* کتابوں کا گرڈ (بالکل ویسا ہی) */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 10px 20px 30px;
  }
  .grid {
    display: grid;
    gap: 24px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }

  .book-card {
    background: var(--glass-bg);
    border: 1px solid var(--border-soft);
    border-radius: 24px;
    padding: 20px 20px 20px;
    display: flex;
    flex-direction: column;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
  }
  .book-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
    opacity: 0;
    transition: 0.3s;
  }
  .book-card:hover::before {
    opacity: 1;
  }
  .book-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--card-shadow), 0 0 20px var(--primary-glow);
    border-color: var(--primary-gold);
    background: rgba(20, 32, 50, 0.8);
  }

  .book-info {
    flex: 1;
    margin-bottom: 18px;
  }
  .book-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text-light);
    line-height: 1.6;
    word-wrap: break-word;
    font-family: 'Noto Nastaliq Urdu', serif;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }
  .book-path {
    font-size: 0.9rem;
    color: var(--primary-gold);
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Amiri', serif;
    background: rgba(0,0,0,0.2);
    padding: 5px 12px;
    border-radius: 30px;
    width: fit-content;
    border: 1px dashed var(--border-soft);
  }

  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 40px;
    text-decoration: none;
    text-align: center;
    font-size: 0.95rem;
    font-weight: 600;
    transition: var(--transition);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    border: none;
    cursor: pointer;
  }
  .btn-fill {
    background: var(--primary-gold);
    color: #0a1020;
    box-shadow: 0 5px 15px rgba(229,192,92,0.3);
  }
  .btn-fill:hover {
    background: #f0d46a;
    transform: scale(1.02);
    box-shadow: 0 8px 20px rgba(229,192,92,0.5);
  }
  .btn-outline {
    border: 1px solid var(--primary-gold);
    color: var(--primary-gold);
    background: transparent;
    backdrop-filter: blur(5px);
  }
  .btn-outline:hover {
    background: rgba(229,192,92,0.15);
    border-color: #f5da7a;
    color: #f5da7a;
  }

  .message-box {
    text-align: center;
    padding: 50px 20px;
    grid-column: 1 / -1;
    background: rgba(0,0,0,0.2);
    border-radius: 40px;
    border: 1px dashed var(--border-soft);
  }
  .message-box i {
    font-size: 3.5rem;
    color: var(--primary-gold);
    margin-bottom: 15px;
    opacity: 0.8;
  }
  .message-box h3 { font-size: 1.8rem; margin-bottom: 8px; }
  .message-box p { color: var(--text-dim); font-size: 1.2rem; }
  .suggestions-title {
    grid-column: 1 / -1;
    color: var(--primary-gold);
    font-size: 1.5rem;
    margin-top: 20px;
    border-bottom: 1px solid var(--border-soft);
    padding-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .loader { 
    display: inline-block; width: 18px; height: 18px; 
    border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; 
    border-top-color: var(--primary-gold); 
    animation: spin 0.8s linear infinite; margin-left: 8px; 
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) {
    body { padding-top: 180px; } /* تھوڑا سا اضافی جگہ بڑے select کے لیے */
    .navbar { flex-direction: column; align-items: center; }
    .logo { justify-content: center; font-size: 1.4rem; margin-bottom: 10px;}
    .stats-bar { flex-direction: column; align-items: center; gap: 5px; }
    /* چھوٹی اسکرین پر بھی select کو مناسب سائز */
    #google_translate_element select { max-width: 280px; }
  }
</style>

<script type="text/javascript">
function googleTranslateElementInit() {

  }, 'google_translate_element');

<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<!-- یہ نیا اسکرپٹ ہے جو ٹرانسلیٹر کے select کو اسکرول ایبل لسٹ باکس میں بدل دے گا -->
<script>
(function makeTranslateScrollable() {
  // جب بھی گوگل ٹرانسلیٹ کا ویجٹ لوڈ ہو، اس کے select کو ڈھونڈ کر size = 8 کریں
  function customizeSelect() {
    const translateDiv = document.getElementById('google_translate_element');
    if (!translateDiv) return;

    const checkExist = setInterval(function() {
      const select = translateDiv.querySelector('select');
      if (select) {
        clearInterval(checkExist);
        
        // صرف ایک بار customize کرنے کے لیے
        if (!select.hasAttribute('data-scrollable')) {
          select.setAttribute('data-scrollable', 'true');
          
          // size = 8 کرنے سے ایک بار میں 8 زبانیں نظر آئیں گی، اور اگر زیادہ ہوں تو اسکرول آ جائے گا
          select.setAttribute('size', '8');
          
          // اسٹائل میں تھوڑی بہتر کاری: اونچائی خودکار اور اسکرول
          select.style.height = 'auto';
          select.style.maxHeight = '200px';
          select.style.overflowY = 'auto';
          select.style.borderRadius = '20px';  // گول کونے برقرار
          select.style.padding = '6px 12px';
          
          // اختیاری: پس منظر تھوڑا شفاف رکھنا
          select.style.background = 'rgba(0, 0, 0, 0.7)';
        }
      }
    }, 300); // ہر 300ms بعد چیک کریں
  }

  // کال کریں جب صفحہ مکمل لوڈ ہو
  window.addEventListener('load', customizeSelect);
  
  // اگر گوگل کا اسکرپٹ پہلے لوڈ ہو جائے تو بھی کام کرے
  if (document.readyState === 'complete') {
    customizeSelect();
  } else {
    window.addEventListener('load', customizeSelect);
  }
})();
</script>

<script>
(function() {
  const CONFIG = {
    API_KEY: 'AIzaSyC8GfeNEk_ugD9TG_5CGyUbwfvFQ88YJts',
    MAIN_FOLDER_ID: '1YDLO466xaB-ytUtBI9ZWk4eMfHOoX_CC',
    CACHE_KEY: 'islamic_library_index_v5',
    CACHE_DURATION: 3600000 // کیشے کا وقت تاکہ فاسٹ لوڈنگ ہو
  };

  let allBooks = [];
  let currentSearchTerm = '';

  const gridEl = document.getElementById('booksGrid');
  const searchInput = document.getElementById('searchInput');
  const clearIcon = document.getElementById('clearSearch');
  const loadingSpan = document.getElementById('loadingStatus');
  const totalSpan = document.getElementById('totalCount');

  function getEditDistance(a, b) {
    if (a.length === 0) return b.length;
    if (b.length === 0) return a.length;
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
      for (let j = 1; j <= a.length; j++) {
        if (b.charAt(i - 1) === a.charAt(j - 1)) {
          matrix[i][j] = matrix[i - 1][j - 1];
        } else {
          matrix[i][j] = Math.min(
            matrix[i - 1][j - 1] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j] + 1
          );
        }
      }
    }
    return matrix[b.length][a.length];
  }

  function getFilteredBooks() {
    let filtered = allBooks;
    if (currentSearchTerm.length < 2) {
      return filtered;
    }
    const term = currentSearchTerm.toLowerCase().trim();
    const exact = filtered.filter(book => book.name.toLowerCase().includes(term));
    if (exact.length > 0) {
      return exact;
    } else {
      const suggestions = filtered.map(book => ({
        ...book,
        score: getEditDistance(term, book.name.toLowerCase().substring(0, term.length))
      }))
      .sort((a, b) => a.score - b.score)
      .slice(0, 6)
      .filter(s => s.score <= term.length + 2);
      return suggestions;
    }
  }

  function renderBooks() {
    const filtered = getFilteredBooks();
    const isSuggestion = (currentSearchTerm.length >= 2 && 
                         !allBooks.some(b => b.name.toLowerCase().includes(currentSearchTerm.toLowerCase())) && 
                         filtered.length > 0);

    totalSpan.innerText = `${allBooks.length} میں سے ${filtered.length} کتابیں`;

    if (filtered.length === 0) {
      gridEl.innerHTML = `
        <div class="message-box">
          <i class="fas fa-book-open"></i>
          <h3>کتاب نہیں ملی</h3>
          <p>آپ کی تلاش کے مطابق کوئی کتاب نہیں مل سکی۔ دوسرے الفاظ آزمائیں۔</p>
        </div>
      `;
      return;
    }

    let html = isSuggestion ? `<div class="suggestions-title"><i class="fas fa-lightbulb"></i> مطلوبہ کتاب نہیں، کیا ان میں سے کوئی مقصود ہے؟</div>` : '';

    const displayBooks = filtered.slice(0, 150);
    html += displayBooks.map(book => `
      <div class="book-card">
        <div class="book-info">
          <div class="book-title">${book.name}</div>
          <div class="book-path"><i class="fas fa-folder-open"></i> ${book.path}</div>
        </div>
        <div class="btn-group">
          <a href="https://drive.google.com/file/d/${book.id}/view" target="_blank" class="btn btn-outline" rel="noopener">
            <i class="fas fa-book-reader"></i> مطالعہ
          </a>
          <a href="https://drive.google.com/uc?export=download&id=${book.id}" class="btn btn-fill" rel="noopener">
            <i class="fas fa-download"></i> ڈاؤن لوڈ
          </a>
        </div>
      </div>
    `).join('');

    gridEl.innerHTML = html;
  }

  searchInput.addEventListener('input', (e) => {
    currentSearchTerm = e.target.value;
    clearIcon.style.display = currentSearchTerm.length > 0 ? 'block' : 'none';
    renderBooks();
  });

  clearIcon.addEventListener('click', () => {
    searchInput.value = '';
    currentSearchTerm = '';
    clearIcon.style.display = 'none';
    renderBooks();
    searchInput.focus();
  });

  async function fetchAllRecursive(folderId, path = "") {
    let nextPageToken = null;
    let subFolders = [];

    try {
      do {
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,files(id,name,mimeType)&key=${CONFIG.API_KEY}&pageToken=${nextPageToken || ''}`;
        const resp = await fetch(url);
        const data = await resp.json();

        if (data.files) {
          for (const file of data.files) {
            if (file.mimeType === 'application/vnd.google-apps.folder') {
              subFolders.push({ id: file.id, name: file.name });
            } else if (file.name.toLowerCase().endsWith('.pdf')) {
              allBooks.push({
                id: file.id,
                name: file.name.replace(/\.pdf$/i, ''),
                path: path || 'مرکزی فولڈر'
              });
            }
          }
        }
        nextPageToken = data.nextPageToken;
      } while (nextPageToken);

      if (subFolders.length > 0) {
        await Promise.all(subFolders.map(folder =>
          fetchAllRecursive(folder.id, path ? `${path} / ${folder.name}` : folder.name)
        ));
      }

      allBooks.sort((a, b) => a.name.localeCompare(b.name, 'ur'));
      localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: allBooks }));
      loadingSpan.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> اپ ڈیٹ ہوگیا';
      renderBooks();
    } catch (e) {
      console.error("Drive fetch error:", e);
      loadingSpan.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#e74c3c;"></i> مسئلہ';
      renderBooks();
    }
  }

  async function loadFromCacheOrFetch() {
    const cached = localStorage.getItem(CONFIG.CACHE_KEY);
    if (cached) {
      const parsed = JSON.parse(cached);
      if (Date.now() - parsed.timestamp < CONFIG.CACHE_DURATION) {
        allBooks = parsed.data.sort((a, b) => a.name.localeCompare(b.name, 'ur'));
        loadingSpan.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> مکمل';
        renderBooks();
        return;
      }
    }
    loadingSpan.innerHTML = '<span class="loader"></span> ڈیٹا لاد رہا ہے...';
    await fetchAllRecursive(CONFIG.MAIN_FOLDER_ID);
  }

  loadFromCacheOrFetch();
})();
</script>

<!-- اسکرپٹ جو ٹرانسلیٹر کے select کو اسکرول ایبل بنائے گا (دوبارہ یقینی بنانے کے لیے) -->
<script>
  // دوسرا طریقہ: mutationObserver سے مستقل نگرانی
  (function watchForTranslate() {
    const target = document.getElementById('google_translate_element');
    if (!target) return;

    const observer = new MutationObserver(function(mutations) {
      const select = target.querySelector('select');
      if (select && !select.hasAttribute('data-scrollable-2')) {
        select.setAttribute('data-scrollable-2', 'true');
        select.setAttribute('size', '8');
        select.style.height = 'auto';
        select.style.maxHeight = '200px';
        select.style.overflowY = 'auto';
        select.style.borderRadius = '20px';
        select.style.background = 'rgba(0, 0, 0, 0.7)';
      }
    });

    observer.observe(target, { childList: true, subtree: true, attributes: false });
  })();
</script>
