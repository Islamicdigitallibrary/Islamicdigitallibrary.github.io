<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050a14">

<script>
  // ورژن کنٹرول - تاکہ پرانی فائلز براؤزر میں پھنس نہ جائیں
  const CURRENT_VERSION = "v_search_2.0_ultra_fast";
  async function updateSiteAssets() {
    const savedVersion = localStorage.getItem('search_page_version');
    if (savedVersion !== CURRENT_VERSION) {
      if ('caches' in window) {
        // پرانی کیش صاف کریں
        const keys = await caches.keys();
        await Promise.all(keys.map(key => caches.delete(key)));
      }
      localStorage.setItem('search_page_version', CURRENT_VERSION);
      // ڈیٹا کیش بھی صاف کریں تاکہ نئی لسٹ بنے
      localStorage.removeItem('islamic_library_index'); 
    }
  }
  updateSiteAssets();
</script>

<title>تلاش کریں | اسلامک ڈیجیٹل لائبریری</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-dark: #050a14;
  --primary-gold: #d4af37;
  --glass: rgba(20, 25, 40, 0.95);
  --glass-card: rgba(255, 255, 255, 0.05);
  --border: rgba(212, 175, 55, 0.3);
  --text: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
  background-color: var(--bg-dark);
  color: var(--text);
  padding-top: 140px; /* Space for fixed header */
  background-attachment: fixed;
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.03) 0px, transparent 20%),
    radial-gradient(circle at 90% 70%, rgba(212, 175, 55, 0.03) 0px, transparent 30%);
}

/* --- Fixed Header Area --- */
.fixed-header {
  position: fixed;
  top: 0; left: 0; width: 100%;
  z-index: 1000;
  background: rgba(5, 10, 20, 0.95);
  backdrop-filter: blur(15px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 5px 20px rgba(0,0,0,0.5);
  padding-bottom: 15px;
}

.navbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 20px;
  max-width: 1200px; margin: 0 auto;
}
.logo { font-size: 1.2rem; color: var(--primary-gold); font-weight: bold; text-decoration: none; }
.home-btn { 
    background: rgba(212, 175, 55, 0.1); 
    border: 1px solid var(--primary-gold); 
    color: var(--primary-gold);
    padding: 5px 15px; border-radius: 20px; text-decoration: none; font-size: 0.9rem; transition:0.3s; 
}
.home-btn:hover { background: var(--primary-gold); color: #000; }

/* --- Search Bar --- */
.search-container {
  max-width: 800px; margin: 0 auto; padding: 0 20px;
  position: relative;
}
.search-input-wrapper {
  position: relative;
  width: 100%;
}
#searchInput {
  width: 100%;
  padding: 12px 50px 12px 20px; /* Right padding for icon */
  border: 2px solid var(--border);
  border-radius: 50px;
  background: rgba(255,255,255,0.05);
  color: white;
  font-size: 1.1rem;
  font-family: 'Amiri', serif;
  transition: 0.3s;
}
#searchInput:focus { outline: none; border-color: var(--primary-gold); background: rgba(0,0,0,0.3); box-shadow: 0 0 15px rgba(212,175,55,0.2); }
.search-icon {
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  color: var(--primary-gold); font-size: 1.1rem;
}

/* --- Stats Bar --- */
.stats-bar {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1200px; margin: 10px auto 0; padding: 0 20px;
  font-size: 0.9rem; color: #aaa;
}
#loadingStatus { color: var(--primary-gold); animation: pulse 1.5s infinite; }

/* --- Main Content --- */
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

.grid {
  display: grid;
  gap: 15px;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); /* Responsive Grid */
}

.book-card {
  background: var(--glass-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 15px;
  transition: 0.2s ease;
  display: flex; flex-direction: column;
}
.book-card:hover { transform: translateY(-3px); border-color: var(--primary-gold); background: rgba(212,175,55,0.08); }

.book-info { flex-grow: 1; }
.book-title { 
    font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; color: #fff; 
    line-height: 1.4;
}
.book-path { 
    font-size: 0.75rem; color: #888; margin-bottom: 10px; 
    display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
}
.book-path i { color: var(--primary-gold); margin-left: 5px; }

.btn-group { display: flex; gap: 8px; margin-top: 10px; }
.btn { 
    flex: 1; padding: 8px; border-radius: 6px; 
    text-decoration: none; font-weight: bold; text-align: center; font-size: 0.85rem; 
    border: none; cursor: pointer; transition: 0.2s; 
}
.btn-fill { background: var(--primary-gold); color: #000; }
.btn-outline { background: transparent; border: 1px solid var(--primary-gold); color: var(--primary-gold); }
.btn-outline:hover { background: var(--primary-gold); color: #000; }

/* --- Loader --- */
.loader-container { text-align: center; padding: 40px; grid-column: 1/-1; }
.spinner { font-size: 2.5rem; color: var(--primary-gold); animation: spin 1s linear infinite; margin-bottom: 15px; }

@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

/* --- Mobile Tweaks --- */
@media (max-width: 600px) {
  body { padding-top: 130px; }
  .grid { grid-template-columns: 1fr; } /* Single column on mobile */
  .book-card { flex-direction: row; align-items: center; gap: 10px; padding: 10px; }
  .book-info { text-align: right; }
  .btn-group { flex-direction: column; min-width: 90px; }
  .book-path { display: none; } /* Hide path on mobile to save space */
  .fixed-header { padding-bottom: 10px; }
  .search-container { padding: 0 15px; }
}
</style>
</head>
<body>

<header class="fixed-header">
  <nav class="navbar">
    <a href="index.html" class="logo"><i class="fas fa-book-reader"></i> لائبریری تلاش</a>
    <a href="index.html" class="home-btn"><i class="fas fa-arrow-left"></i> واپسی</a>
  </nav>

  <div class="search-container">
    <div class="search-input-wrapper">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="کتاب کا نام لکھیں..." autocomplete="off">
    </div>
  </div>

  <div class="stats-bar">
    <span id="loadingStatus"><i class="fas fa-sync fa-spin"></i> ڈیٹا لوڈ ہو رہا ہے...</span>
    <span id="totalCount">0 کتابیں</span>
  </div>
</header>

<main class="container">
  <div id="booksGrid" class="grid">
    <div class="loader-container">
        <i class="fas fa-circle-notch spinner"></i>
        <h3>براہ کرم انتظار کریں</h3>
        <p>تمام فولڈرز کو اسکین کیا جا رہا ہے...</p>
    </div>
  </div>
</main>

<script>
const CONFIG = {
  API_KEY: 'AIzaSyC8GfeNEk_ugD9TG_5CGyUbwfvFQ88YJts',
  MAIN_FOLDER_ID: '1YDLO466xaB-ytUtBI9ZWk4eMfHOoX_CC',
  CACHE_KEY: 'islamic_library_index',
  CACHE_DURATION: 3600000 // 1 Hour
};

let allBooks = [];
let isScanning = false;

// DOM Elements
const searchInput = document.getElementById('searchInput');
const grid = document.getElementById('booksGrid');
const statusSpan = document.getElementById('loadingStatus');
const countSpan = document.getElementById('totalCount');

// 1. Initialize
document.addEventListener('DOMContentLoaded', () => {
    loadFromCacheOrFetch();
    searchInput.focus();
});

// 2. Load Data Logic
async function loadFromCacheOrFetch() {
    const cached = localStorage.getItem(CONFIG.CACHE_KEY);
    if (cached) {
        try {
            const parsed = JSON.parse(cached);
            if (Date.now() - parsed.timestamp < CONFIG.CACHE_DURATION) {
                allBooks = parsed.data;
                statusSpan.innerHTML = '<i class="fas fa-check-circle"></i> مکمل';
                statusSpan.style.color = '#4caf50';
                statusSpan.style.animation = 'none';
                renderBooks(allBooks);
                return;
            }
        } catch(e) { console.error("Cache Error", e); }
    }
    
    // If no cache, start fetching
    statusSpan.innerHTML = '<i class="fas fa-satellite-dish"></i> اسکیننگ جاری...';
    await fetchAllRecursive(CONFIG.MAIN_FOLDER_ID);
}

// 3. Recursive Fetch (Optimized)
async function fetchAllRecursive(folderId, path = "") {
    isScanning = true;
    let nextPageToken = null;
    let tempCount = 0;

    try {
        do {
            const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,files(id,name,mimeType)&key=${CONFIG.API_KEY}&pageToken=${nextPageToken || ''}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.files) {
                for (const file of data.files) {
                    if (file.mimeType === 'application/vnd.google-apps.folder') {
                        // Go deeper (Recursive)
                        // Note: Using await here ensures we don't spam the API too hard at once
                        await fetchAllRecursive(file.id, path ? `${path} / ${file.name}` : file.name);
                    } else if (file.name.toLowerCase().endsWith('.pdf')) {
                        // It's a book
                        allBooks.push({
                            id: file.id,
                            name: file.name.replace('.pdf',''),
                            path: path || 'Main'
                        });
                        tempCount++;
                    }
                }
            }
            
            // UI Update during fetch (Shows user it's working)
            countSpan.innerText = `${allBooks.length} کتابیں`;
            if(allBooks.length % 50 === 0) renderBooks(allBooks); // Update UI every 50 books found

            nextPageToken = data.nextPageToken;
        } while (nextPageToken);
    } catch (e) {
        console.error("Fetch Error:", e);
        statusSpan.innerText = "لائن منقطع ہو گئی";
    }

    // Finished
    if (folderId === CONFIG.MAIN_FOLDER_ID) {
        isScanning = false;
        statusSpan.innerHTML = '<i class="fas fa-check"></i> فہرست اپڈیٹ ہو گئی';
        statusSpan.style.color = '#4caf50';
        statusSpan.style.animation = 'none';
        
        // Save to cache
        localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({
            timestamp: Date.now(),
            data: allBooks
        }));
        
        renderBooks(allBooks); // Final Render
    }
}

// 4. Render Function (Fast)
function renderBooks(books) {
    if (books.length === 0) {
        if(!isScanning) grid.innerHTML = '<div class="loader-container"><h3>کوئی کتاب نہیں ملی</h3></div>';
        return;
    }

    // Sort Alphabetically
    // Note: Doing this on every render might be slow for 1000+ items, 
    // but useful for the final list.
    if(!isScanning) {
        books.sort((a, b) => a.name.localeCompare(b.name, 'ur'));
    }

    // Limit initial display to prevent browser hang if list is huge
    // Only showing filtered result or first 100 if searching is empty
    const displayList = searchInput.value ? books : books.slice(0, 100); 

    const html = displayList.map(book => `
        <div class="book-card">
            <div class="book-info">
                <div class="book-title">${book.name}</div>
                <div class="book-path"><i class="fas fa-folder"></i> ${book.path}</div>
            </div>
            <div class="btn-group">
                <a href="https://drive.google.com/file/d/${book.id}/view" target="_blank" class="btn btn-outline">پڑھیں</a>
                <a href="https://drive.google.com/uc?export=download&id=${book.id}" class="btn btn-fill">ڈاؤن لوڈ</a>
            </div>
        </div>
    `).join('');

    // If list is huge and truncated
    const moreMsg = (!searchInput.value && books.length > 100) 
        ? `<div style="grid-column:1/-1; text-align:center; padding:20px; color:#888;">مزید ${books.length - 100} کتابیں... تلاش کریں</div>` 
        : '';

    grid.innerHTML = html + moreMsg;
    countSpan.innerText = `${books.length} کتابیں`;
}

// 5. Search Logic
searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    if (term.length < 2) {
        // If search is cleared, show initial 100
        renderBooks(allBooks); 
        return;
    }
    
    const filtered = allBooks.filter(book => 
        book.name.toLowerCase().includes(term) || 
        book.path.toLowerCase().includes(term)
    );
    renderBooks(filtered);
});

</script>

</body>
</html>
