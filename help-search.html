<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#0a1020">
<title>تلاش کریں | اسلامک ڈیجیٹل لائبریری</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* ===== ROOT VARIABLES ===== */
  :root {
    --bg-deep: #0a1020;
    --primary-gold: #e5c05c;
    --primary-glow: rgba(229, 192, 92, 0.25);
    --glass-bg: rgba(15, 25, 40, 0.6);
    --border-soft: rgba(229, 192, 92, 0.2);
    --text-light: #ffffff;
    --text-dim: #b0bcd0;
    --card-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.6);
    --transition: all 0.25s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
    background-color: var(--bg-deep);
    color: var(--text-light);
    padding-top: 140px;
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(229,192,92,0.06), transparent 30%),
      radial-gradient(circle at 90% 70%, rgba(229,192,92,0.06), transparent 30%);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* --- GOOGLE TRANSLATE CUSTOM CSS --- */
  body { top: 0 !important; }
  .skiptranslate iframe { display: none !important; }
  #goog-gt-tt, .goog-te-banner-frame { display: none !important; }
  .goog-text-highlight { background: transparent !important; box-shadow: none !important; }
  
  /* ترجمہ والے بٹن کا ڈیزائن */
  #google_translate_element select {
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid var(--border-soft);
    border-radius: 40px;
    color: var(--text-light);
    padding: 8px 18px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    font-family: 'Amiri', serif;
    font-size: 0.95rem;
    outline: none;
    transition: var(--transition);
  }
  #google_translate_element select:hover {
    border-color: var(--primary-gold);
    box-shadow: 0 0 12px var(--primary-glow);
  }
  #google_translate_element select option {
    background: #0a1020;
    color: white;
  }
  .goog-logo-link { display: none !important; }
  .goog-te-gadget { color: transparent !important; }

  /* --- FIXED HEADER --- */
  .fixed-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    background: rgba(10, 16, 32, 0.9);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-soft);
    padding: 12px 0 8px 0;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    max-width: 1400px;
    margin: 0 auto;
    flex-wrap: wrap;
    gap: 10px;
  }

  .logo {
    font-size: 1.6rem;
    color: var(--primary-gold);
    font-weight: 700;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
  }
  .logo i {
    font-size: 1.8rem;
    color: #f5d97a;
  }

  /* سرچ بار */
  .search-container {
    max-width: 900px;
    margin: 12px auto 8px;
    padding: 0 20px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    right: 35px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--primary-gold);
    font-size: 1.1rem;
    pointer-events: none;
    z-index: 2;
  }
  .clear-icon {
    position: absolute;
    left: 35px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    cursor: pointer;
    display: none;
    padding: 8px;
    z-index: 2;
    transition: var(--transition);
    border-radius: 50%;
  }
  .clear-icon:hover {
    color: var(--primary-gold);
    background: rgba(255,255,255,0.05);
  }

  #searchInput {
    width: 100%;
    padding: 16px 50px 16px 50px;
    border: 1px solid var(--border-soft);
    border-radius: 50px;
    background: rgba(0, 0, 0, 0.4);
    color: white;
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    transition: var(--transition);
    box-shadow: inset 0 3px 10px rgba(0,0,0,0.3), 0 0 0px var(--primary-glow);
    backdrop-filter: blur(5px);
  }
  #searchInput:focus {
    outline: none;
    border-color: var(--primary-gold);
    background: rgba(10, 15, 30, 0.8);
    box-shadow: 0 0 20px var(--primary-glow), inset 0 2px 8px black;
  }
  #searchInput::placeholder {
    color: #95a5b3;
    font-size: 1rem;
  }

  /* شماریات بار */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    max-width: 1200px;
    margin: 10px auto 0;
    padding: 0 20px;
    font-size: 1rem;
    color: var(--text-dim);
    font-family: 'Amiri';
    flex-wrap: wrap;
  }
  #loadingStatus i, #totalCount i {
    margin-left: 5px;
  }

  /* کتابوں کا گرڈ */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 10px 20px 30px;
  }
  .grid {
    display: grid;
    gap: 24px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }

  .book-card {
    background: var(--glass-bg);
    border: 1px solid var(--border-soft);
    border-radius: 24px;
    padding: 20px 20px 20px;
    display: flex;
    flex-direction: column;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
  }
  .book-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
    opacity: 0;
    transition: 0.3s;
  }
  .book-card:hover::before {
    opacity: 1;
  }
  .book-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--card-shadow), 0 0 20px var(--primary-glow);
    border-color: var(--primary-gold);
    background: rgba(20, 32, 50, 0.8);
  }

  .book-info {
    flex: 1;
    margin-bottom: 18px;
  }
  .book-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text-light);
    line-height: 1.6;
    word-wrap: break-word;
    font-family: 'Noto Nastaliq Urdu', serif;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }
  .book-path {
    font-size: 0.9rem;
    color: var(--primary-gold);
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Amiri', serif;
    background: rgba(0,0,0,0.2);
    padding: 5px 12px;
    border-radius: 30px;
    width: fit-content;
    border: 1px dashed var(--border-soft);
  }

  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 40px;
    text-decoration: none;
    text-align: center;
    font-size: 0.95rem;
    font-weight: 600;
    transition: var(--transition);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    border: none;
    cursor: pointer;
  }
  .btn-fill {
    background: var(--primary-gold);
    color: #0a1020;
    box-shadow: 0 5px 15px rgba(229,192,92,0.3);
  }
  .btn-fill:hover {
    background: #f0d46a;
    transform: scale(1.02);
    box-shadow: 0 8px 20px rgba(229,192,92,0.5);
  }
  .btn-outline {
    border: 1px solid var(--primary-gold);
    color: var(--primary-gold);
    background: transparent;
    backdrop-filter: blur(5px);
  }
  .btn-outline:hover {
    background: rgba(229,192,92,0.15);
    border-color: #f5da7a;
    color: #f5da7a;
  }

  .loader { 
    display: inline-block; width: 18px; height: 18px; 
    border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; 
    border-top-color: var(--primary-gold); 
    animation: spin 0.8s linear infinite; margin-left: 8px; 
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 700px) {
    body { padding-top: 160px; }
    .navbar { flex-direction: column; align-items: center; }
    .logo { justify-content: center; font-size: 1.4rem; margin-bottom: 10px;}
    .stats-bar { flex-direction: column; align-items: center; gap: 5px; }
  }
</style>
</head>
<body>

<header class="fixed-header">
  <nav class="navbar">
    <a href="index.html" class="logo"><i class="fas fa-book-open"></i> اسلامک ڈیجیٹل لائبریری</a>
    
    <div id="google_translate_element"></div>

  </nav>

  <div class="search-container">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" placeholder="کتاب، مصنف یا موضوع تلاش کریں..." autocomplete="off">
    <i class="fas fa-times-circle clear-icon" id="clearSearch" title="صاف کریں"></i>
  </div>

  <div class="stats-bar">
    <span id="loadingStatus"><span class="loader"></span> لوڈ ہو رہا ہے...</span>
    <span id="totalCount">0 کتابیں</span>
  </div>
</header>

<main class="container">
  <div id="booksGrid" class="grid"></div>
</main>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'ur', // آپ کی ویب سائٹ کی بنیادی زبان
    includedLanguages: 'en,ar,hi,fa,ps,sd,bn,es,fr', // آپ یہاں مزید زبانوں کے کوڈ بھی ڈال سکتے ہیں
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE
  }, 'google_translate_element');
}
</script>
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
(function() {
  const CONFIG = {
    API_KEY: 'AIzaSyC8GfeNEk_ugD9TG_5CGyUbwfvFQ88YJts', // یہ آپ کی گوگل ڈرائیو کی API ہے، اسے چھیڑنے کی ضرورت نہیں
    MAIN_FOLDER_ID: '1YDLO466xaB-ytUtBI9ZWk4eMfHOoX_CC',
    CACHE_KEY: 'islamic_library_index_v5',
    CACHE_DURATION: 3600000
  };

  let allBooks = [];
  let currentSearchTerm = '';

  const gridEl = document.getElementById('booksGrid');
  const searchInput = document.getElementById('searchInput');
  const clearIcon = document.getElementById('clearSearch');
  const loadingSpan = document.getElementById('loadingStatus');
  const totalSpan = document.getElementById('totalCount');

  function renderBooks() {
    let filtered = allBooks;
    if (currentSearchTerm.length >= 2) {
      filtered = allBooks.filter(book => book.name.toLowerCase().includes(currentSearchTerm.toLowerCase().trim()));
    }

    totalSpan.innerText = `${allBooks.length} میں سے ${filtered.length} کتابیں`;

    if (filtered.length === 0) {
      gridEl.innerHTML = `<div style="text-align:center; width:100%; color:#fff; grid-column:1/-1;">کتاب نہیں ملی</div>`;
      return;
    }

    gridEl.innerHTML = filtered.slice(0, 150).map(book => `
      <div class="book-card">
        <div class="book-info">
          <div class="book-title">${book.name}</div>
        </div>
        <div class="btn-group">
          <a href="https://drive.google.com/file/d/${book.id}/view" target="_blank" class="btn btn-outline" rel="noopener">مطالعہ</a>
        </div>
      </div>
    `).join('');
  }

  searchInput.addEventListener('input', (e) => {
    currentSearchTerm = e.target.value;
    clearIcon.style.display = currentSearchTerm.length > 0 ? 'block' : 'none';
    renderBooks();
  });

  clearIcon.addEventListener('click', () => {
    searchInput.value = '';
    currentSearchTerm = '';
    clearIcon.style.display = 'none';
    renderBooks();
  });

  async function fetchAllRecursive(folderId) {
    try {
      const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)&key=${CONFIG.API_KEY}`;
      const resp = await fetch(url);
      const data = await resp.json();
      
      if (data.files) {
        data.files.forEach(file => {
          if (file.name.toLowerCase().endsWith('.pdf')) {
            allBooks.push({ id: file.id, name: file.name.replace(/\.pdf$/i, '') });
          }
        });
      }
      loadingSpan.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> اپ ڈیٹ ہوگیا';
      renderBooks();
    } catch (e) {
      loadingSpan.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#e74c3c;"></i> مسئلہ';
    }
  }

  fetchAllRecursive(CONFIG.MAIN_FOLDER_ID);
})();
</script>

</body>
</html>
