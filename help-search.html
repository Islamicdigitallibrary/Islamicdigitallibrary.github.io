<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#0a1020">
<title>تلاش کریں | اسلامک ڈیجیٹل لائبریری</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* ===== ROOT VARIABLES ===== */
  :root {
    --bg-deep: #0a1020;
    --primary-gold: #e5c05c;
    --primary-glow: rgba(229, 192, 92, 0.25);
    --glass-bg: rgba(15, 25, 40, 0.6);
    --border-soft: rgba(229, 192, 92, 0.2);
    --text-light: #ffffff;
    --text-dim: #b0bcd0;
    --card-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.6);
    --transition: all 0.25s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
    background-color: var(--bg-deep);
    color: var(--text-light);
    padding-top: 140px;
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(229,192,92,0.06), transparent 30%),
      radial-gradient(circle at 90% 70%, rgba(229,192,92,0.06), transparent 30%);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* --- GOOGLE TRANSLATE CUSTOM (تمام زبانیں، مکمل نمائش) --- */
  body { top: 0 !important; }
  .skiptranslate iframe { display: none !important; }
  #goog-gt-tt, .goog-te-banner-frame { display: none !important; }
  .goog-text-highlight { background: transparent !important; box-shadow: none !important; }

  /* --- FIXED HEADER --- */
  .fixed-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    background: rgba(10, 16, 32, 0.9);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-soft);
    padding: 12px 0 8px 0;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    max-width: 1400px;
    margin: 0 auto;
    flex-wrap: wrap;
    gap: 10px;
  }

  .logo {
    font-size: 1.6rem;
    color: var(--primary-gold);
    font-weight: 700;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
  }
  .logo i {
    font-size: 1.8rem;
    color: #f5d97a;
  }

  /* ===== CUSTOM LANGUAGE SELECTOR (اضافہ شدہ) ===== */
  .language-selector-wrapper {
    position: relative;
    display: inline-block;
    font-family: 'Amiri', serif;
    min-width: 260px;
  }
  .lang-btn {
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid var(--border-soft);
    border-radius: 40px;
    color: var(--text-light);
    padding: 8px 18px;
    width: 100%;
    text-align: right;
    cursor: pointer;
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
    font-size: 0.95rem;
  }
  .lang-btn i:first-child {
    color: var(--primary-gold);
    margin-left: auto;
  }
  .lang-btn i:last-child {
    margin-right: auto;
    font-size: 0.8rem;
    opacity: 0.8;
  }
  .lang-btn:hover {
    border-color: var(--primary-gold);
    box-shadow: 0 0 12px var(--primary-glow);
    background: rgba(20, 30, 50, 0.9);
  }
  .lang-dropdown {
    position: absolute;
    top: calc(100% + 5px);
    left: 0;
    right: 0;
    background: rgba(10, 16, 32, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    padding: 10px;
    display: none;
    z-index: 2000;
    max-height: 350px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
  }
  .lang-dropdown.show {
    display: block;
  }
  .lang-search {
    position: relative;
    margin-bottom: 8px;
  }
  .lang-search i {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--primary-gold);
    font-size: 0.9rem;
  }
  .lang-search input {
    width: 100%;
    padding: 10px 35px 10px 12px;
    border: 1px solid var(--border-soft);
    border-radius: 30px;
    background: rgba(0, 0, 0, 0.4);
    color: white;
    font-family: 'Amiri', serif;
    font-size: 0.9rem;
  }
  .lang-search input:focus {
    outline: none;
    border-color: var(--primary-gold);
    background: rgba(10, 15, 30, 0.8);
  }
  .lang-list {
    max-height: 250px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--primary-gold) #1a1f2f;
  }
  .lang-list::-webkit-scrollbar {
    width: 5px;
  }
  .lang-list::-webkit-scrollbar-track {
    background: #1a1f2f;
    border-radius: 10px;
  }
  .lang-list::-webkit-scrollbar-thumb {
    background: var(--primary-gold);
    border-radius: 10px;
  }
  .lang-item {
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 30px;
    transition: var(--transition);
    color: var(--text-dim);
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lang-item:hover {
    background: rgba(229, 192, 92, 0.15);
    color: var(--primary-gold);
  }
  .lang-item.selected {
    background: rgba(229, 192, 92, 0.25);
    color: var(--primary-gold);
    font-weight: 700;
  }
  @media (max-width: 700px) {
    .language-selector-wrapper {
      width: 100%;
      min-width: auto;
    }
    .lang-dropdown {
      max-height: 300px;
    }
  }

  /* سرچ بار */
  .search-container {
    max-width: 900px;
    margin: 12px auto 8px;
    padding: 0 20px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    right: 35px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--primary-gold);
    font-size: 1.1rem;
    pointer-events: none;
    z-index: 2;
  }
  .clear-icon {
    position: absolute;
    left: 35px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    cursor: pointer;
    display: none;
    padding: 8px;
    z-index: 2;
    transition: var(--transition);
    border-radius: 50%;
  }
  .clear-icon:hover {
    color: var(--primary-gold);
    background: rgba(255,255,255,0.05);
  }

  #searchInput {
    width: 100%;
    padding: 16px 50px 16px 50px;
    border: 1px solid var(--border-soft);
    border-radius: 50px;
    background: rgba(0, 0, 0, 0.4);
    color: white;
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    transition: var(--transition);
    box-shadow: inset 0 3px 10px rgba(0,0,0,0.3), 0 0 0px var(--primary-glow);
    backdrop-filter: blur(5px);
  }
  #searchInput:focus {
    outline: none;
    border-color: var(--primary-gold);
    background: rgba(10, 15, 30, 0.8);
    box-shadow: 0 0 20px var(--primary-glow), inset 0 2px 8px black;
  }
  #searchInput::placeholder {
    color: #95a5b3;
    font-size: 1rem;
  }

  /* شماریات بار */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    max-width: 1200px;
    margin: 10px auto 0;
    padding: 0 20px;
    font-size: 1rem;
    color: var(--text-dim);
    font-family: 'Amiri';
    flex-wrap: wrap;
  }
  #loadingStatus i, #totalCount i {
    margin-left: 5px;
  }

  /* کتابوں کا گرڈ */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 10px 20px 30px;
  }
  .grid {
    display: grid;
    gap: 24px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }

  .book-card {
    background: var(--glass-bg);
    border: 1px solid var(--border-soft);
    border-radius: 24px;
    padding: 20px 20px 20px;
    display: flex;
    flex-direction: column;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
  }
  .book-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
    opacity: 0;
    transition: 0.3s;
  }
  .book-card:hover::before {
    opacity: 1;
  }
  .book-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--card-shadow), 0 0 20px var(--primary-glow);
    border-color: var(--primary-gold);
    background: rgba(20, 32, 50, 0.8);
  }

  .book-info {
    flex: 1;
    margin-bottom: 18px;
  }
  .book-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text-light);
    line-height: 1.6;
    word-wrap: break-word;
    font-family: 'Noto Nastaliq Urdu', serif;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }
  .book-path {
    font-size: 0.9rem;
    color: var(--primary-gold);
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Amiri', serif;
    background: rgba(0,0,0,0.2);
    padding: 5px 12px;
    border-radius: 30px;
    width: fit-content;
    border: 1px dashed var(--border-soft);
  }

  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 40px;
    text-decoration: none;
    text-align: center;
    font-size: 0.95rem;
    font-weight: 600;
    transition: var(--transition);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    border: none;
    cursor: pointer;
  }
  .btn-fill {
    background: var(--primary-gold);
    color: #0a1020;
    box-shadow: 0 5px 15px rgba(229,192,92,0.3);
  }
  .btn-fill:hover {
    background: #f0d46a;
    transform: scale(1.02);
    box-shadow: 0 8px 20px rgba(229,192,92,0.5);
  }
  .btn-outline {
    border: 1px solid var(--primary-gold);
    color: var(--primary-gold);
    background: transparent;
    backdrop-filter: blur(5px);
  }
  .btn-outline:hover {
    background: rgba(229,192,92,0.15);
    border-color: #f5da7a;
    color: #f5da7a;
  }

  .message-box {
    text-align: center;
    padding: 50px 20px;
    grid-column: 1 / -1;
    background: rgba(0,0,0,0.2);
    border-radius: 40px;
    border: 1px dashed var(--border-soft);
  }
  .message-box i {
    font-size: 3.5rem;
    color: var(--primary-gold);
    margin-bottom: 15px;
    opacity: 0.8;
  }
  .message-box h3 { font-size: 1.8rem; margin-bottom: 8px; }
  .message-box p { color: var(--text-dim); font-size: 1.2rem; }
  .suggestions-title {
    grid-column: 1 / -1;
    color: var(--primary-gold);
    font-size: 1.5rem;
    margin-top: 20px;
    border-bottom: 1px solid var(--border-soft);
    padding-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .loader { 
    display: inline-block; width: 18px; height: 18px; 
    border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; 
    border-top-color: var(--primary-gold); 
    animation: spin 0.8s linear infinite; margin-left: 8px; 
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* موبائل کے لیے مزید بہتریاں */
  @media (max-width: 700px) {
    body { padding-top: 160px; }
    .navbar { flex-direction: column; align-items: stretch; }
    .logo { justify-content: center; font-size: 1.4rem; }
    .stats-bar { flex-direction: column; align-items: center; gap: 5px; }
  }

  @media (max-width: 480px) {
    .grid { gap: 15px; }
    .book-card { padding: 16px; }
    .btn-group { flex-direction: column; }
    .logo { font-size: 1.2rem; }
    body { padding-top: 170px; }
  }
</style>

  <nav class="navbar">
    <a href="index.html" class="logo"><i class="fas fa-book-open"></i> اسلامک ڈیجیٹل لائبریری</a>

    <div class="language-selector-wrapper">
      <button class="lang-btn" id="langDropdownBtn">

<main class="container">
  <div id="booksGrid" class="grid"></div>

<!-- کتابوں کے ڈیٹا اور سرچ کا اسکرپٹ (آپ کا اصل والا) -->
<script>
(function() {
  const CONFIG = {
    API_KEY: 'AIzaSyC8GfeNEk_ugD9TG_5CGyUbwfvFQ88YJts',
    MAIN_FOLDER_ID: '1YDLO466xaB-ytUtBI9ZWk4eMfHOoX_CC',
    CACHE_KEY: 'islamic_library_index_v5',
    CACHE_DURATION: 3600000
  };

  let allBooks = [];
  let currentSearchTerm = '';

  const gridEl = document.getElementById('booksGrid');
  const searchInput = document.getElementById('searchInput');
  const clearIcon = document.getElementById('clearSearch');
  const loadingSpan = document.getElementById('loadingStatus');
  const totalSpan = document.getElementById('totalCount');

  function getEditDistance(a, b) {
    if (a.length === 0) return b.length;
    if (b.length === 0) return a.length;
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
      for (let j = 1; j <= a.length; j++) {
        if (b.charAt(i - 1) === a.charAt(j - 1)) {
          matrix[i][j] = matrix[i - 1][j - 1];
        } else {
          matrix[i][j] = Math.min(
            matrix[i - 1][j - 1] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j] + 1
          );
        }
      }
    }
    return matrix[b.length][a.length];
  }

  function getFilteredBooks() {
    let filtered = allBooks;
    if (currentSearchTerm.length < 2) {
      return filtered;
    }
    const term = currentSearchTerm.toLowerCase().trim();
    const exact = filtered.filter(book => book.name.toLowerCase().includes(term));
    if (exact.length > 0) {
      return exact;
    } else {
      const suggestions = filtered.map(book => ({
        ...book,
        score: getEditDistance(term, book.name.toLowerCase().substring(0, term.length))
      }))
      .sort((a, b) => a.score - b.score)
      .slice(0, 6)
      .filter(s => s.score <= term.length + 2);
      return suggestions;
    }
  }

  function renderBooks() {
    const filtered = getFilteredBooks();
    const isSuggestion = (currentSearchTerm.length >= 2 && 
                         !allBooks.some(b => b.name.toLowerCase().includes(currentSearchTerm.toLowerCase())) && 
                         filtered.length > 0);

    totalSpan.innerText = `${allBooks.length} میں سے ${filtered.length} کتابیں`;

    if (filtered.length === 0) {
      gridEl.innerHTML = `
        <div class="message-box">
          <i class="fas fa-book-open"></i>
          <h3>کتاب نہیں ملی</h3>
          <p>آپ کی تلاش کے مطابق کوئی کتاب نہیں مل سکی۔ دوسرے الفاظ آزمائیں۔</p>
        </div>
      `;
      return;
    }

    let html = isSuggestion ? `<div class="suggestions-title"><i class="fas fa-lightbulb"></i> مطلوبہ کتاب نہیں، کیا ان میں سے کوئی مقصود ہے؟</div>` : '';

    const displayBooks = filtered.slice(0, 150);
    html += displayBooks.map(book => `
      <div class="book-card">
        <div class="book-info">
          <div class="book-title">${book.name}</div>
          <div class="book-path"><i class="fas fa-folder-open"></i> ${book.path}</div>
        </div>
        <div class="btn-group">
          <a href="https://drive.google.com/file/d/${book.id}/view" target="_blank" class="btn btn-outline" rel="noopener">
            <i class="fas fa-book-reader"></i> مطالعہ
          </a>
          <a href="https://drive.google.com/uc?export=download&id=${book.id}" class="btn btn-fill" rel="noopener">
            <i class="fas fa-download"></i> ڈاؤن لوڈ
          </a>
        </div>
      </div>
    `).join('');

    gridEl.innerHTML = html;
  }

  searchInput.addEventListener('input', (e) => {
    currentSearchTerm = e.target.value;
    clearIcon.style.display = currentSearchTerm.length > 0 ? 'block' : 'none';
    renderBooks();
  });

  clearIcon.addEventListener('click', () => {
    searchInput.value = '';
    currentSearchTerm = '';
    clearIcon.style.display = 'none';
    renderBooks();
    searchInput.focus();
  });

  async function fetchAllRecursive(folderId, path = "") {
    let nextPageToken = null;
    let subFolders = [];

    try {
      do {
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,files(id,name,mimeType)&key=${CONFIG.API_KEY}&pageToken=${nextPageToken || ''}`;
        const resp = await fetch(url);
        const data = await resp.json();

        if (data.files) {
          for (const file of data.files) {
            if (file.mimeType === 'application/vnd.google-apps.folder') {
              subFolders.push({ id: file.id, name: file.name });
            } else if (file.name.toLowerCase().endsWith('.pdf')) {
              allBooks.push({
                id: file.id,
                name: file.name.replace(/\.pdf$/i, ''),
                path: path || 'مرکزی فولڈر'
              });
            }
          }
        }
        nextPageToken = data.nextPageToken;
      } while (nextPageToken);

      if (subFolders.length > 0) {
        await Promise.all(subFolders.map(folder =>
          fetchAllRecursive(folder.id, path ? `${path} / ${folder.name}` : folder.name)
        ));
      }

      allBooks.sort((a, b) => a.name.localeCompare(b.name, 'ur'));
      localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: allBooks }));
      loadingSpan.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> اپ ڈیٹ ہوگیا';
      renderBooks();
    } catch (e) {
      console.error("Drive fetch error:", e);
      loadingSpan.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#e74c3c;"></i> مسئلہ';
      renderBooks();
    }
  }

  async function loadFromCacheOrFetch() {
    const cached = localStorage.getItem(CONFIG.CACHE_KEY);
    if (cached) {
      const parsed = JSON.parse(cached);
      if (Date.now() - parsed.timestamp < CONFIG.CACHE_DURATION) {
        allBooks = parsed.data.sort((a, b) => a.name.localeCompare(b.name, 'ur'));
        loadingSpan.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> مکمل';
        renderBooks();
        return;
      }
    }
    loadingSpan.innerHTML = '<span class="loader"></span> ڈیٹا لاد رہا ہے...';
    await fetchAllRecursive(CONFIG.MAIN_FOLDER_ID);
  }

  loadFromCacheOrFetch();
})();
</script>

    // Sort languages by name
    languages.sort((a, b) => a.name.localeCompare(b.name));

    // Get cookie value
    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? decodeURIComponent(match[2]) : null;
    }

    // Set cookie (domain/path)
    function setCookie(name, value, days = 365) {
      const d = new Date();
      d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
      document.cookie = name + "=" + value + ";expires=" + d.toUTCString() + ";path=/";
    }

    // Get current language code from cookie (if any)
    function getCurrentLangCode() {
      const transCookie = getCookie('googtrans');
      if (transCookie) {
        // Google Translate sets cookie like "googtrans=/ur/en" for target language.
        const match = transCookie.match(/\/([a-z]{2,3}(-[A-Z]{2,3})?)$/);
        return match ? match[1] : null;
      }
      return null;
    }

    // Display current language name in button
    function updateSelectedLanguage() {
      const currentCode = getCurrentLangCode();
      const lang = languages.find(l => l.code === currentCode);
      document.getElementById('selectedLangDisplay').innerText = lang ? lang.name : 'Select Language';
    }

    // Render language list
    function renderLanguageList(filter = '') {
      const listEl = document.getElementById('langList');
      const filterLower = filter.toLowerCase();
      const filtered = languages.filter(l => l.name.toLowerCase().includes(filterLower));
      const currentCode = getCurrentLangCode();

      listEl.innerHTML = filtered.map(l => `
        <div class="lang-item ${l.code === currentCode ? 'selected' : ''}" data-code="${l.code}">${l.name}</div>
      `).join('');

      // Attach click handlers
      document.querySelectorAll('.lang-item').forEach(item => {
        item.addEventListener('click', function(e) {
          const code = this.dataset.code;
          // Set cookie: googtrans=/ur/xx  (ur is source language, xx is target)
          setCookie('googtrans', '/ur/' + code);
          // Reload to apply translation
          location.reload();
        });
      });
    }

    // Dropdown toggle
    const btn = document.getElementById('langDropdownBtn');
    const dropdown = document.getElementById('langDropdown');
    const searchInput = document.getElementById('langSearch');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('show');
      if (dropdown.classList.contains('show')) {
        searchInput.focus();
        renderLanguageList(searchInput.value);
      }
    });

    // Search filter
    searchInput.addEventListener('input', () => {
      renderLanguageList(searchInput.value);
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target) && !btn.contains(e.target)) {
        dropdown.classList.remove('show');
      }
    });

    // Initialize
    updateSelectedLanguage();
    renderLanguageList();
  })();
