<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050a14">

<link rel="preconnect" href="https://www.googleapis.com">
<link rel="dns-prefetch" href="https://www.googleapis.com">

<script>
  const CURRENT_VERSION = "v_search_3.0_smart_fuzzy";
  async function updateSiteAssets() {
    const savedVersion = localStorage.getItem('search_page_version');
    if (savedVersion !== CURRENT_VERSION) {
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(key => caches.delete(key)));
      }
      localStorage.setItem('search_page_version', CURRENT_VERSION);
      localStorage.removeItem('islamic_library_index'); 
    }
  }
  updateSiteAssets();
</script>

<title>تلاش کریں | اسلامک ڈیجیٹل لائبریری</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-dark: #050a14;
  --primary-gold: #d4af37;
  --glass-card: rgba(255, 255, 255, 0.05);
  --border: rgba(212, 175, 55, 0.3);
  --text: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
  background-color: var(--bg-dark);
  color: var(--text);
  padding-top: 140px; 
  background-attachment: fixed;
  background-image: radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.03) 0px, transparent 20%);
}

.fixed-header {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
  background: rgba(5, 10, 20, 0.95); backdrop-filter: blur(15px);
  border-bottom: 1px solid var(--border); padding-bottom: 15px;
}

.navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; max-width: 1200px; margin: 0 auto; }
.logo { font-size: 1.2rem; color: var(--primary-gold); font-weight: bold; text-decoration: none; }

.search-container { max-width: 800px; margin: 0 auto; padding: 0 20px; position: relative; }
#searchInput {
  width: 100%; padding: 12px 50px; border: 2px solid var(--border); border-radius: 50px;
  background: rgba(255,255,255,0.05); color: white; font-family: 'Amiri', serif;
}

.stats-bar { display: flex; justify-content: space-between; max-width: 1200px; margin: 10px auto; padding: 0 20px; font-size: 0.9rem; color: #aaa; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

.book-card {
  background: var(--glass-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 15px; display: flex; flex-direction: column; transition: 0.2s;
}

/* ٹیکسٹ کو اگلی لائن پر منتقل کرنے کی سیٹنگ */
.book-info { flex: 1; min-width: 0; }
.book-title { 
    font-size: 1.1rem; font-weight: bold; color: #fff; line-height: 1.6;
    word-wrap: break-word; overflow-wrap: break-word; white-space: normal; 
}
.book-path { font-size: 0.75rem; color: #888; margin-top: 5px; word-wrap: break-word; }

.btn-group { display: flex; gap: 8px; margin-top: 15px; }
.btn { flex: 1; padding: 10px; border-radius: 6px; text-decoration: none; text-align: center; font-size: 0.85rem; font-weight: bold; }
.btn-fill { background: var(--primary-gold); color: #000; }
.btn-outline { border: 1px solid var(--primary-gold); color: var(--primary-gold); }

@media (max-width: 600px) {
  .book-card { flex-direction: column; align-items: stretch; }
  .book-path { display: block; } /* موبائل پر فولڈر کا نام دکھائیں */
}
</style>
</head>
<body>

<header class="fixed-header">
  <nav class="navbar">
    <a href="index.html" class="logo"><i class="fas fa-book-reader"></i> لائبریری تلاش</a>
    <a href="index.html" style="color:var(--primary-gold); text-decoration:none;">واپسی</a>
  </nav>
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="کتاب یا موضوع تلاش کریں..." autocomplete="off">
  </div>
  <div class="stats-bar">
    <span id="loadingStatus">لوڈنگ...</span>
    <span id="totalCount">0 کتابیں</span>
  </div>
</header>

<main class="container">
  <div id="booksGrid" class="grid"></div>
</main>

<script>
const CONFIG = {
  API_KEY: 'AIzaSyC8GfeNEk_ugD9TG_5CGyUbwfvFQ88YJts',
  MAIN_FOLDER_ID: '1YDLO466xaB-ytUtBI9ZWk4eMfHOoX_CC',
  CACHE_KEY: 'islamic_library_index',
  CACHE_DURATION: 3600000 
};

let allBooks = [];

// اسمارٹ سرچ الگورتھم (Fuzzy Search Logic)
function getSimilarity(s1, s2) {
  let longer = s1.length < s2.length ? s2 : s1;
  let shorter = s1.length < s2.length ? s1 : s2;
  if (longer.length == 0) return 1.0;
  return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
}

function editDistance(s1, s2) {
  s1 = s1.toLowerCase(); s2 = s2.toLowerCase();
  let costs = new Array();
  for (let i = 0; i <= s1.length; i++) {
    let lastValue = i;
    for (let j = 0; j <= s2.length; j++) {
      if (i == 0) costs[j] = j;
      else {
        if (j > 0) {
          let newValue = costs[j - 1];
          if (s1.charAt(i - 1) != s2.charAt(j - 1)) newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
          costs[j - 1] = lastValue; lastValue = newValue;
        }
      }
    }
    if (i > 0) costs[s2.length] = lastValue;
  }
  return costs[s2.length];
}

async function loadFromCacheOrFetch() {
    const cached = localStorage.getItem(CONFIG.CACHE_KEY);
    if (cached) {
        const parsed = JSON.parse(cached);
        if (Date.now() - parsed.timestamp < CONFIG.CACHE_DURATION) {
            allBooks = parsed.data;
            document.getElementById('loadingStatus').innerText = "مکمل";
            renderBooks(allBooks);
            return;
        }
    }
    await fetchAllRecursive(CONFIG.MAIN_FOLDER_ID);
}

async function fetchAllRecursive(folderId, path = "") {
    let nextPageToken = null;
    try {
        do {
            const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,files(id,name,mimeType)&key=${CONFIG.API_KEY}&pageToken=${nextPageToken || ''}`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.files) {
                for (const file of data.files) {
                    if (file.mimeType === 'application/vnd.google-apps.folder') {
                        await fetchAllRecursive(file.id, path ? `${path} / ${file.name}` : file.name);
                    } else if (file.name.toLowerCase().endsWith('.pdf')) {
                        allBooks.push({ id: file.id, name: file.name.replace('.pdf',''), path: path || 'Main' });
                    }
                }
            }
            renderBooks(allBooks);
            nextPageToken = data.nextPageToken;
        } while (nextPageToken);
    } catch (e) { console.error(e); }
    
    localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: allBooks }));
}

function renderBooks(books) {
    const grid = document.getElementById('booksGrid');
    const displayList = document.getElementById('searchInput').value ? books : books.slice(0, 100);
    grid.innerHTML = displayList.map(book => `
        <div class="book-card">
            <div class="book-info">
                <div class="book-title">${book.name}</div>
                <div class="book-path"><i class="fas fa-folder"></i> ${book.path}</div>
            </div>
            <div class="btn-group">
                <a href="https://drive.google.com/file/d/${book.id}/view" target="_blank" class="btn btn-outline">مطالعہ</a>
                <a href="https://drive.google.com/uc?export=download&id=${book.id}" class="btn btn-fill">ڈاؤن لوڈ</a>
            </div>
        </div>
    `).join('');
    document.getElementById('totalCount').innerText = `${books.length} کتابیں`;
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    if (term.length < 2) { renderBooks(allBooks); return; }
    
    // اسمارٹ فلٹر: لفظ شامل ہو یا اس سے ملتا جلتا ہو
    const filtered = allBooks.filter(book => {
        const name = book.name.toLowerCase();
        return name.includes(term) || getSimilarity(name, term) > 0.4;
    });
    renderBooks(filtered);
});

loadFromCacheOrFetch();
</script>
</body>
</html>
