<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#0a1020">
<title>تلاش کریں | اسلامک ڈیجیٹل لائبریری</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* ===== ROOT VARIABLES ===== */
  :root {
    --bg-deep: #0a1020;
    --primary-gold: #e5c05c;
    --primary-glow: rgba(229, 192, 92, 0.25);
    --glass-bg: rgba(15, 25, 40, 0.6);
    --border-soft: rgba(229, 192, 92, 0.2);
    --text-light: #ffffff;
    --text-dim: #b0bcd0;
    --card-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.6);
    --transition: all 0.25s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
    background-color: var(--bg-deep);
    color: var(--text-light);
    padding-top: 165px; /* room for fixed header + filter */
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(229,192,92,0.06), transparent 30%),
      radial-gradient(circle at 90% 70%, rgba(229,192,92,0.06), transparent 30%);
    background-attachment: fixed;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* --- GOOGLE TRANSLATE CUSTOM (full language visibility) --- */
  body { top: 0 !important; }
  .skiptranslate iframe { display: none !important; }
  #goog-gt-tt, .goog-te-banner-frame { display: none !important; }
  .goog-text-highlight { background: transparent !important; box-shadow: none !important; }

  #google_translate_element {
    margin: 0;
    font-family: 'Amiri', serif;
  }
  .goog-te-gadget {
    color: transparent !important;
    font-size: 0 !important;
    display: flex;
    justify-content: flex-end;
  }
  .goog-te-gadget .goog-te-combo {
    color: var(--text-light) !important;
    background: rgba(0, 0, 0, 0.6) !important;
    border: 1px solid var(--border-soft) !important;
    border-radius: 40px !important;
    padding: 8px 28px 8px 18px !important;
    font-family: 'Amiri', serif !important;
    font-size: 1rem !important;
    font-weight: 400;
    outline: none;
    cursor: pointer;
    width: auto !important;
    min-width: 180px !important;
    max-width: 260px !important;
    backdrop-filter: blur(8px);
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23e5c05c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: left 12px center;
    background-size: 14px;
    transition: var(--transition);
  }
  .goog-te-gadget .goog-te-combo:hover, 
  .goog-te-gadget .goog-te-combo:focus {
    border-color: var(--primary-gold) !important;
    box-shadow: 0 0 12px var(--primary-glow);
    background-color: rgba(20, 30, 50, 0.9) !important;
  }
  .goog-te-gadget .goog-te-combo option {
    background: #1a1f2f;
    color: white;
    font-size: 0.95rem;
    padding: 5px;
  }

  /* --- FIXED HEADER --- */
  .fixed-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    background: rgba(10, 16, 32, 0.9);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-soft);
    padding: 12px 0 12px 0;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
  }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    max-width: 1400px;
    margin: 0 auto;
    flex-wrap: wrap;
    gap: 10px;
  }

  .logo {
    font-size: 1.6rem;
    color: var(--primary-gold);
    font-weight: 700;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
  }
  .logo i {
    font-size: 1.8rem;
    color: #f5d97a;
  }

  /* search area */
  .search-container {
    max-width: 900px;
    margin: 15px auto 8px;
    padding: 0 20px;
    position: relative;
  }
  .search-icon {
    position: absolute;
    right: 35px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--primary-gold);
    font-size: 1.1rem;
    pointer-events: none;
    z-index: 2;
  }
  .clear-icon {
    position: absolute;
    left: 35px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    cursor: pointer;
    display: none;
    padding: 8px;
    z-index: 2;
    transition: var(--transition);
    border-radius: 50%;
  }
  .clear-icon:hover {
    color: var(--primary-gold);
    background: rgba(255,255,255,0.05);
  }

  #searchInput {
    width: 100%;
    padding: 16px 50px 16px 50px;
    border: 1px solid var(--border-soft);
    border-radius: 50px;
    background: rgba(0, 0, 0, 0.4);
    color: white;
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    transition: var(--transition);
    box-shadow: inset 0 3px 10px rgba(0,0,0,0.3), 0 0 0px var(--primary-glow);
    backdrop-filter: blur(5px);
  }
  #searchInput:focus {
    outline: none;
    border-color: var(--primary-gold);
    background: rgba(10, 15, 30, 0.8);
    box-shadow: 0 0 20px var(--primary-glow), inset 0 2px 8px black;
  }
  #searchInput::placeholder {
    color: #95a5b3;
    font-size: 1rem;
  }

  /* --- NEW ALPHABET FILTER BAR (Urdu) --- */
  .alphabet-filter {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px 8px;
    max-width: 1100px;
    margin: 15px auto 5px;
    padding: 0 15px;
  }
  .letter-btn {
    background: rgba(20, 30, 45, 0.7);
    border: 1px solid var(--border-soft);
    color: var(--text-dim);
    font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
    font-size: 1.3rem;
    font-weight: 500;
    min-width: 44px;
    height: 44px;
    border-radius: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
    cursor: pointer;
    transition: var(--transition);
    backdrop-filter: blur(4px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    line-height: 1;
  }
  .letter-btn:hover {
    border-color: var(--primary-gold);
    color: #f5e1a0;
    background: rgba(229, 192, 92, 0.15);
    transform: translateY(-2px);
  }
  .letter-btn.active {
    background: var(--primary-gold);
    color: #0a1020;
    border-color: var(--primary-gold);
    font-weight: 700;
    box-shadow: 0 0 15px #e5c05c;
  }
  .letter-btn.all-btn {
    font-size: 1rem;
    min-width: 60px;
    background: rgba(0,0,0,0.3);
    border-color: #5f6a80;
  }

  /* stats bar */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    max-width: 1200px;
    margin: 8px auto 0;
    padding: 0 20px;
    font-size: 1rem;
    color: var(--text-dim);
    font-family: 'Amiri';
    flex-wrap: wrap;
  }
  #loadingStatus i, #totalCount i {
    margin-left: 5px;
  }

  /* main grid */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 10px 20px 30px;
  }
  .grid {
    display: grid;
    gap: 24px;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }

  /* book cards – more premium */
  .book-card {
    background: var(--glass-bg);
    border: 1px solid var(--border-soft);
    border-radius: 24px;
    padding: 20px 20px 20px;
    display: flex;
    flex-direction: column;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
  }
  .book-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
    opacity: 0;
    transition: 0.3s;
  }
  .book-card:hover::before {
    opacity: 1;
  }
  .book-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--card-shadow), 0 0 20px var(--primary-glow);
    border-color: var(--primary-gold);
    background: rgba(20, 32, 50, 0.8);
  }

  .book-info {
    flex: 1;
    margin-bottom: 18px;
  }
  .book-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text-light);
    line-height: 1.6;
    word-wrap: break-word;
    font-family: 'Noto Nastaliq Urdu', serif;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }
  .book-path {
    font-size: 0.9rem;
    color: var(--primary-gold);
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Amiri', serif;
    background: rgba(0,0,0,0.2);
    padding: 5px 12px;
    border-radius: 30px;
    width: fit-content;
    border: 1px dashed var(--border-soft);
  }

  /* buttons */
  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 40px;
    text-decoration: none;
    text-align: center;
    font-size: 0.95rem;
    font-weight: 600;
    transition: var(--transition);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    border: none;
    cursor: pointer;
  }
  .btn-fill {
    background: var(--primary-gold);
    color: #0a1020;
    box-shadow: 0 5px 15px rgba(229,192,92,0.3);
  }
  .btn-fill:hover {
    background: #f0d46a;
    transform: scale(1.02);
    box-shadow: 0 8px 20px rgba(229,192,92,0.5);
  }
  .btn-outline {
    border: 1px solid var(--primary-gold);
    color: var(--primary-gold);
    background: transparent;
    backdrop-filter: blur(5px);
  }
  .btn-outline:hover {
    background: rgba(229,192,92,0.15);
    border-color: #f5da7a;
    color: #f5da7a;
  }

  /* message boxes */
  .message-box {
    text-align: center;
    padding: 50px 20px;
    grid-column: 1 / -1;
    background: rgba(0,0,0,0.2);
    border-radius: 40px;
    border: 1px dashed var(--border-soft);
  }
  .message-box i {
    font-size: 3.5rem;
    color: var(--primary-gold);
    margin-bottom: 15px;
    opacity: 0.8;
  }
  .message-box h3 { font-size: 1.8rem; margin-bottom: 8px; }
  .message-box p { color: var(--text-dim); font-size: 1.2rem; }
  .suggestions-title {
    grid-column: 1 / -1;
    color: var(--primary-gold);
    font-size: 1.5rem;
    margin-top: 20px;
    border-bottom: 1px solid var(--border-soft);
    padding-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .loader { 
    display: inline-block; width: 18px; height: 18px; 
    border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; 
    border-top-color: var(--primary-gold); 
    animation: spin 0.8s linear infinite; margin-left: 8px; 
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- RESPONSIVE TWEAKS --- */
  @media (max-width: 700px) {
    body { padding-top: 190px; }
    .navbar { flex-direction: column; align-items: stretch; }
    .logo { justify-content: center; font-size: 1.4rem; }
    #google_translate_element { display: flex; justify-content: center; margin-top: 5px; }
    .goog-te-gadget .goog-te-combo { min-width: 240px !important; font-size: 0.95rem !important; }
    .alphabet-filter { gap: 4px; }
    .letter-btn { min-width: 38px; height: 38px; font-size: 1.1rem; }
    .stats-bar { flex-direction: column; align-items: center; gap: 5px; }
  }

  @media (max-width: 480px) {
    .grid { gap: 15px; }
    .book-card { padding: 16px; }
    .btn-group { flex-direction: column; }
    .alphabet-filter .letter-btn { min-width: 32px; height: 32px; font-size: 1rem; }
    .logo { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<script type="text/javascript">
  function googleTranslateElementInit() {

<script>
(function() {
  // ----- CONFIG -----
  const CONFIG = {
    API_KEY: 'AIzaSyC8GfeNEk_ugD9TG_5CGyUbwfvFQ88YJts',
    MAIN_FOLDER_ID: '1YDLO466xaB-ytUtBI9ZWk4eMfHOoX_CC',
    CACHE_KEY: 'islamic_library_index_v5',
    CACHE_DURATION: 3600000
  };

  let allBooks = [];
  let currentLetter = 'all';        // active letter filter
  let currentSearchTerm = '';

  // DOM elements
  const gridEl = document.getElementById('booksGrid');
  const searchInput = document.getElementById('searchInput');
  const clearIcon = document.getElementById('clearSearch');
  const loadingSpan = document.getElementById('loadingStatus');
  const totalSpan = document.getElementById('totalCount');
  const letterButtons = document.querySelectorAll('.letter-btn');

  // ----- HELPER: Edit distance (for suggestions) -----
  function getEditDistance(a, b) {
    if (a.length === 0) return b.length;
    if (b.length === 0) return a.length;
    const matrix = [];
    for (let i = 0; i <= b.length; i++) matrix[i] = [i];
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
      for (let j = 1; j <= a.length; j++) {
        if (b.charAt(i - 1) === a.charAt(j - 1)) {
          matrix[i][j] = matrix[i - 1][j - 1];
        } else {
          matrix[i][j] = Math.min(
            matrix[i - 1][j - 1] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j] + 1
          );
        }
      }
    }
    return matrix[b.length][a.length];
  }

  // ----- FILTER LOGIC (by letter + search term) -----
  function getFilteredBooks() {
    let filtered = allBooks;

    // 1) Filter by letter if not 'all'
    if (currentLetter !== 'all') {
      filtered = filtered.filter(book => {
        const firstChar = book.name.charAt(0);
        return firstChar === currentLetter;
      });
    }

    // 2) If search term length < 2, return filtered (no search)
    if (currentSearchTerm.length < 2) {
      return filtered;
    }

    const term = currentSearchTerm.toLowerCase().trim();

    // exact matches (includes term)
    const exact = filtered.filter(book => book.name.toLowerCase().includes(term));

    if (exact.length > 0) {
      return exact;   // show exact matches
    } else {
      // suggestions based on edit distance (from filtered set)
      const suggestions = filtered.map(book => {
        return {
          ...book,
          score: getEditDistance(term, book.name.toLowerCase().substring(0, term.length))
        };
      })
      .sort((a, b) => a.score - b.score)
      .slice(0, 6)
      .filter(s => s.score <= term.length + 2);  // reasonable fuzziness
      return suggestions;
    }
  }

  // ----- RENDER -----
  function renderBooks() {
    const filtered = getFilteredBooks();
    const isSuggestion = (currentSearchTerm.length >= 2 && 
                         !allBooks.some(b => b.name.toLowerCase().includes(currentSearchTerm.toLowerCase())) && 
                         filtered.length > 0);

    totalSpan.innerText = `${allBooks.length} میں سے ${filtered.length} کتابیں`;

    if (filtered.length === 0) {
      gridEl.innerHTML = `
        <div class="message-box">
          <i class="fas fa-book-open"></i>
          <h3>کتاب نہیں ملی</h3>
          <p>اس زمرے یا حرف میں کوئی کتاب نہیں ہے۔ دوسرا حرف آزمائیں۔</p>
        </div>
      `;
      return;
    }

    let html = isSuggestion ? `<div class="suggestions-title"><i class="fas fa-lightbulb"></i> مطلوبہ کتاب نہیں، کیا ان میں سے کوئی مقصود ہے؟</div>` : '';

    const displayBooks = filtered.slice(0, 150); // limit for performance

    html += displayBooks.map(book => `
      <div class="book-card">
        <div class="book-info">
          <div class="book-title">${book.name}</div>
          <div class="book-path"><i class="fas fa-folder-open"></i> ${book.path}</div>
        </div>
        <div class="btn-group">
          <a href="https://drive.google.com/file/d/${book.id}/view" target="_blank" class="btn btn-outline" rel="noopener">
            <i class="fas fa-book-reader"></i> مطالعہ
          </a>
          <a href="https://drive.google.com/uc?export=download&id=${book.id}" class="btn btn-fill" rel="noopener">
            <i class="fas fa-download"></i> ڈاؤن لوڈ
          </a>
        </div>
      </div>
    `).join('');

    gridEl.innerHTML = html;
  }

  // ----- ALPHABET BUTTON ACTIVE TOGGLE -----
  function setActiveLetter(letter) {
    letterButtons.forEach(btn => {
      const btnLetter = btn.dataset.letter;
      if (btnLetter === letter) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  // ----- EVENT: letter click -----
  letterButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const letter = btn.dataset.letter;
      currentLetter = letter;
      setActiveLetter(letter);
      renderBooks();
    });
  });

  // ----- EVENT: search input -----
  searchInput.addEventListener('input', (e) => {
    currentSearchTerm = e.target.value;
    clearIcon.style.display = currentSearchTerm.length > 0 ? 'block' : 'none';
    renderBooks();
  });

  // ----- EVENT: clear search -----
  clearIcon.addEventListener('click', () => {
    searchInput.value = '';
    currentSearchTerm = '';
    clearIcon.style.display = 'none';
    renderBooks();
    searchInput.focus();
  });

  // ----- FETCH DATA (recursive drive loader) -----
  async function fetchAllRecursive(folderId, path = "") {
    let nextPageToken = null;
    let subFolders = [];

    try {
      do {
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,files(id,name,mimeType)&key=${CONFIG.API_KEY}&pageToken=${nextPageToken || ''}`;
        const resp = await fetch(url);
        const data = await resp.json();

        if (data.files) {
          for (const file of data.files) {
            if (file.mimeType === 'application/vnd.google-apps.folder') {
              subFolders.push({ id: file.id, name: file.name });
            } else if (file.name.toLowerCase().endsWith('.pdf')) {
              allBooks.push({
                id: file.id,
                name: file.name.replace(/\.pdf$/i, ''),
                path: path || 'مرکزی فولڈر'
              });
            }
          }
        }
        nextPageToken = data.nextPageToken;
      } while (nextPageToken);

      // recursively process subfolders
      if (subFolders.length > 0) {
        await Promise.all(subFolders.map(folder =>
          fetchAllRecursive(folder.id, path ? `${path} / ${folder.name}` : folder.name)
        ));
      }

      // after all fetched, sort alphabetically and render
      allBooks.sort((a, b) => a.name.localeCompare(b.name, 'ur'));
      localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: allBooks }));
      loadingSpan.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> اپ ڈیٹ ہوگیا';
      renderBooks();
    } catch (e) {
      console.error("Drive fetch error:", e);
      loadingSpan.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#e74c3c;"></i> مسئلہ';
      // still try to render whatever we have
      renderBooks();
    }
  }

  // load from cache or start fetch
  async function loadFromCacheOrFetch() {
    const cached = localStorage.getItem(CONFIG.CACHE_KEY);
    if (cached) {
      const parsed = JSON.parse(cached);
      if (Date.now() - parsed.timestamp < CONFIG.CACHE_DURATION) {
        allBooks = parsed.data.sort((a, b) => a.name.localeCompare(b.name, 'ur'));
        loadingSpan.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> مکمل';
        renderBooks();
        return;
      }
    }
    loadingSpan.innerHTML = '<span class="loader"></span> ڈیٹا لاد رہا ہے...';
    await fetchAllRecursive(CONFIG.MAIN_FOLDER_ID);
  }

  // start
  loadFromCacheOrFetch();
})();
</script>
