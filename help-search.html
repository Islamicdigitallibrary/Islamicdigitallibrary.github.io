<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050a14">

<title>تلاش کریں | اسلامک ڈیجیٹل لائبریری</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-dark: #0a0f1d;
  --primary-gold: #e5c05c;
  --primary-gold-dim: rgba(229, 192, 92, 0.2);
  --glass-bg: rgba(255, 255, 255, 0.03);
  --border-color: rgba(229, 192, 92, 0.15);
  --text-main: #ffffff;
  --text-muted: #a0aabf;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
  background-color: var(--bg-dark);
  color: var(--text-main);
  padding-top: 140px; 
  background-image: 
    radial-gradient(circle at 15% 50%, rgba(229, 192, 92, 0.05), transparent 25%),
    radial-gradient(circle at 85% 30%, rgba(229, 192, 92, 0.05), transparent 25%);
  background-attachment: fixed;
  min-height: 100vh;
}

/* --- Google Translate Custom Professional Styling --- */
/* Hide the top translation banner and annoying popups */
body { top: 0 !important; }
.skiptranslate iframe { display: none !important; }
#goog-gt-tt { display: none !important; }
.goog-te-banner-frame { display: none !important; }
.goog-tooltip { display: none !important; }
.goog-tooltip:hover { display: none !important; }
.goog-text-highlight { background-color: transparent !important; border: none !important; box-shadow: none !important; }

/* Style the dropdown to match the theme */
#google_translate_element { margin-top: 0; }
.goog-te-gadget { 
  font-family: 'Amiri', serif !important; 
  color: transparent !important; /* Hides "Powered by Google" text */
  font-size: 0px !important; 
}
.goog-te-gadget .goog-te-combo {
  color: var(--text-main) !important;
  background: rgba(0,0,0,0.5) !important;
  border: 1px solid var(--border-color) !important;
  padding: 6px 10px !important;
  border-radius: 8px !important;
  font-family: 'Amiri', serif !important;
  font-size: 14px !important;
  outline: none;
  cursor: pointer;
  transition: all 0.3s ease;
}
.goog-te-gadget .goog-te-combo:focus {
  border-color: var(--primary-gold) !important;
  box-shadow: 0 0 10px var(--primary-gold-dim) !important;
}
/* --------------------------------------------------- */

/* Header & Navbar */
.fixed-header {
  position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
  background: rgba(10, 15, 29, 0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-color);
  padding: 10px 0 15px 0;
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
}

.navbar { 
  display: flex; justify-content: space-between; align-items: center; 
  padding: 5px 20px; max-width: 1200px; margin: 0 auto; 
}

.logo { 
  font-size: 1.4rem; color: var(--primary-gold); 
  font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 8px;
}

/* Search Bar with Clear Icon Feature */
.search-container { max-width: 800px; margin: 15px auto 0; padding: 0 20px; position: relative; }
.search-icon { position: absolute; right: 35px; top: 50%; transform: translateY(-50%); color: var(--primary-gold); }
.clear-icon { 
  position: absolute; left: 35px; top: 50%; transform: translateY(-50%); 
  color: var(--text-muted); cursor: pointer; display: none; padding: 5px;
}
.clear-icon:hover { color: var(--primary-gold); }

#searchInput {
  width: 100%; padding: 14px 45px 14px 45px; 
  border: 1px solid var(--border-color); border-radius: 12px;
  background: rgba(0,0,0,0.3); color: white; 
  font-family: 'Amiri', serif; font-size: 1.1rem;
  transition: all 0.3s ease;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}
#searchInput:focus { outline: none; border-color: var(--primary-gold); background: rgba(0,0,0,0.5); box-shadow: 0 0 15px var(--primary-gold-dim); }

/* Stats */
.stats-bar { 
  display: flex; justify-content: space-between; max-width: 1200px; 
  margin: 12px auto 0; padding: 0 20px; font-size: 0.95rem; color: var(--text-muted); 
}

/* Grid & Cards */
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

.book-card {
  background: var(--glass-bg); border: 1px solid var(--border-color); 
  border-radius: 16px; padding: 20px; display: flex; flex-direction: column; 
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative; overflow: hidden;
}
.book-card:hover { 
  transform: translateY(-5px); 
  box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px var(--primary-gold-dim); 
  border-color: var(--primary-gold);
}

.book-info { flex: 1; margin-bottom: 20px; }
.book-title { 
  font-size: 1.25rem; font-weight: bold; color: var(--text-main); 
  line-height: 1.5; word-wrap: break-word; font-family: 'Noto Nastaliq Urdu', serif;
}
.book-path { font-size: 0.85rem; color: var(--primary-gold); margin-top: 10px; display: flex; align-items: center; gap: 6px; font-family: 'Amiri', serif;}

/* Buttons */
.btn-group { display: flex; gap: 10px; }
.btn { 
  flex: 1; padding: 12px; border-radius: 8px; text-decoration: none; 
  text-align: center; font-size: 0.95rem; font-weight: bold; transition: all 0.2s;
  display: flex; justify-content: center; align-items: center; gap: 8px;
}
.btn-fill { background: var(--primary-gold); color: #000; }
.btn-fill:hover { background: #f0d075; transform: scale(1.02); }
.btn-outline { border: 1px solid var(--primary-gold); color: var(--primary-gold); background: transparent; }
.btn-outline:hover { background: var(--primary-gold-dim); }

/* Messages (Errors/Not Found) */
.message-box { text-align: center; padding: 40px 20px; grid-column: 1 / -1; }
.message-box i { font-size: 3rem; color: var(--primary-gold); margin-bottom: 15px; }
.message-box h3 { font-size: 1.5rem; margin-bottom: 10px; }
.message-box p { color: var(--text-muted); font-family: 'Amiri'; font-size: 1.1rem; }
.suggestions-title { grid-column: 1 / -1; color: var(--primary-gold); font-size: 1.3rem; margin-top: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }

/* Loader */
.loader { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: var(--primary-gold); animation: spin 1s ease-in-out infinite; margin-left: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive adjustments */
@media (max-width: 600px) {
  body { padding-top: 140px; }
  .navbar { flex-direction: row; flex-wrap: nowrap; } /* Keep logo and translate in one line */
  .logo { font-size: 1.1rem; } /* Smaller logo on mobile */
  .goog-te-gadget .goog-te-combo { max-width: 100px; font-size: 12px !important; padding: 4px !important; }
  .btn-group { flex-direction: column; }
}
</style>
</head>
<body>

<header class="fixed-header">
  <nav class="navbar">
    <a href="index.html" class="logo"><i class="fas fa-book-open"></i> اسلامک لائبریری</a>
    <div id="google_translate_element"></div>
  </nav>
  <div class="search-container">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="searchInput" placeholder="کتاب، مصنف یا موضوع تلاش کریں..." autocomplete="off">
    <i class="fas fa-times clear-icon" id="clearSearch" title="تلاش ختم کریں"></i>
  </div>
  <div class="stats-bar">
    <span id="loadingStatus"><span class="loader"></span> ڈیٹا لوڈ ہو رہا ہے...</span>
    <span id="totalCount">0 کتابیں</span>
  </div>
</header>

<main class="container">
  <div id="booksGrid" class="grid"></div>
</main>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
      pageLanguage: 'ur', 
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false
  }, 'google_translate_element');
}
</script>
<script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
const CONFIG = {
  API_KEY: 'AIzaSyC8GfeNEk_ugD9TG_5CGyUbwfvFQ88YJts', 
  MAIN_FOLDER_ID: '1YDLO466xaB-ytUtBI9ZWk4eMfHOoX_CC',
  CACHE_KEY: 'islamic_library_index_v4',
  CACHE_DURATION: 3600000 
};

let allBooks = [];

function getEditDistance(a, b) {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;
  const matrix = [];
  for (let i = 0; i <= b.length; i++) matrix[i] = [i];
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
      }
    }
  }
  return matrix[b.length][a.length];
}

function sortBooksAlphabetically(booksArray) {
    return booksArray.sort((a, b) => a.name.localeCompare(b.name, 'ur'));
}

async function loadFromCacheOrFetch() {
    const cached = localStorage.getItem(CONFIG.CACHE_KEY);
    if (cached) {
        const parsed = JSON.parse(cached);
        if (Date.now() - parsed.timestamp < CONFIG.CACHE_DURATION) {
            allBooks = sortBooksAlphabetically(parsed.data);
            document.getElementById('loadingStatus').innerHTML = '<i class="fas fa-check-circle" style="color:#28a745;"></i> مکمل';
            renderBooks(allBooks);
            return;
        }
    }
    await fetchAllRecursive(CONFIG.MAIN_FOLDER_ID);
}

async function fetchAllRecursive(folderId, path = "") {
    let nextPageToken = null;
    let subFolders = [];
    try {
        do {
            const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,files(id,name,mimeType)&key=${CONFIG.API_KEY}&pageToken=${nextPageToken || ''}`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.files) {
                for (const file of data.files) {
                    if (file.mimeType === 'application/vnd.google-apps.folder') {
                        subFolders.push({id: file.id, name: file.name});
                    } else if (file.name.toLowerCase().endsWith('.pdf')) {
                        allBooks.push({ id: file.id, name: file.name.replace('.pdf',''), path: path || 'مرکزی فولڈر' });
                    }
                }
            }
            allBooks = sortBooksAlphabetically(allBooks);
            renderBooks(allBooks);
            nextPageToken = data.nextPageToken;
        } while (nextPageToken);

        if(subFolders.length > 0) {
            await Promise.all(subFolders.map(folder => 
                fetchAllRecursive(folder.id, path ? `${path} / ${folder.name}` : folder.name)
            ));
        }
        
    } catch (e) { 
        console.error("Error fetching Drive data:", e); 
        document.getElementById('loadingStatus').innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#ff4444;"></i> مسئلہ درپیش ہے';
    }
    
    localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({ timestamp: Date.now(), data: allBooks }));
    document.getElementById('loadingStatus').innerHTML = '<i class="fas fa-check-circle" style="color:#28a745;"></i> مکمل';
}

function renderBooks(books, isSuggestion = false) {
    const grid = document.getElementById('booksGrid');
    document.getElementById('totalCount').innerText = `${allBooks.length} میں سے ${books.length} کتابیں`;

    if (books.length === 0) {
        grid.innerHTML = `
            <div class="message-box">
                <i class="fas fa-search-minus"></i>
                <h3>مطلوبہ کتاب نہیں ملی</h3>
                <p>اس نام سے کوئی کتاب اپلوڈ نہیں ہے۔ براہ کرم نام کے ہجے چیک کریں یا مختلف الفاظ استعمال کریں۔</p>
            </div>
        `;
        return;
    }

    let html = isSuggestion ? `<div class="suggestions-title"><i class="fas fa-lightbulb"></i> کیا آپ کی مراد ان میں سے کوئی کتاب تھی؟</div>` : '';
    
    const displayList = books.slice(0, 150); 
    
    html += displayList.map(book => `
        <div class="book-card">
            <div class="book-info">
                <div class="book-title">${book.name}</div>
                <div class="book-path"><i class="fas fa-folder-open"></i> ${book.path}</div>
            </div>
            <div class="btn-group">
                <a href="https://drive.google.com/file/d/${book.id}/view" target="_blank" class="btn btn-outline">
                    <i class="fas fa-book-reader"></i> مطالعہ کریں
                </a>
                <a href="https://drive.google.com/uc?export=download&id=${book.id}" class="btn btn-fill">
                    <i class="fas fa-download"></i> ڈاؤن لوڈ
                </a>
            </div>
        </div>
    `).join('');
    
    grid.innerHTML = html;
}

// Smart Search Logic & Clear Icon
const searchInput = document.getElementById('searchInput');
const clearIcon = document.getElementById('clearSearch');

searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase().trim();
    
    // Show/Hide Clear Icon
    clearIcon.style.display = term.length > 0 ? 'block' : 'none';

    if (term.length < 2) { renderBooks(allBooks); return; }
    
    const exactMatches = allBooks.filter(book => book.name.toLowerCase().includes(term));
    
    if (exactMatches.length > 0) {
        renderBooks(exactMatches);
    } else {
        const suggestions = allBooks.map(book => {
            return {
                ...book,
                score: getEditDistance(term, book.name.toLowerCase().substring(0, term.length))
            };
        })
        .sort((a, b) => a.score - b.score)
        .slice(0, 6); 

        const validSuggestions = suggestions.filter(s => s.score <= term.length + 2);

        if (validSuggestions.length > 0) {
            renderBooks(validSuggestions, true);
        } else {
            renderBooks([]); 
        }
    }
});

// Clear Search Action
clearIcon.addEventListener('click', () => {
    searchInput.value = '';
    clearIcon.style.display = 'none';
    renderBooks(allBooks);
    searchInput.focus();
});

loadFromCacheOrFetch();
</script>
</body>
</html>
