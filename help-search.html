<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="yandex-verification" content="7a058aaf8b3219ca" />
<meta name="google-adsense-account" content="ca-pub-1417987183063486">

<script>
  const CURRENT_VERSION = "v_help_1.0_pro_fixed";
  async function updateSiteAssets() {
    const savedVersion = localStorage.getItem('site_version_help');
    if (savedVersion !== CURRENT_VERSION) {
      if ('caches' in window) {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(cacheName => caches.delete(cacheName)));
      }
      localStorage.setItem('site_version_help', CURRENT_VERSION);
      localStorage.removeItem('all_books_cache'); // پرانی کیش ختم کریں
    }
  }
  updateSiteAssets();
</script>

<title>ہیلپ سینٹر | کتاب تلاش کریں</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --bg-dark: #050a14;
  --primary-gold: #d4af37;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(212, 175, 55, 0.2);
  --text: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Nastaliq Urdu', 'Amiri', serif;
  background-color: var(--bg-dark);
  color: var(--text);
  line-height: 1.8;
  background-attachment: fixed;
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.02) 0px, transparent 20%),
    radial-gradient(circle at 90% 70%, rgba(212, 175, 55, 0.02) 0px, transparent 30%),
    repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.01) 0px, rgba(212, 175, 55, 0.01) 2px, transparent 2px, transparent 6px);
}
.navbar {
  position: sticky; top: 0; z-index: 1000;
  background: rgba(5, 10, 20, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 15px 20px;
}
.nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 1.5rem; color: var(--primary-gold); font-weight: bold; text-decoration: none; }
.container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }

.help-header { text-align: center; margin-bottom: 40px; }
.help-header h1 { font-size: 2.5rem; color: var(--primary-gold); margin-bottom: 10px; }

.search-wrapper { max-width: 600px; margin: 0 auto 40px; position: relative; }
.search-wrapper i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--primary-gold); font-size: 1.2rem; }
#searchInput {
  width: 100%;
  padding: 18px 55px 18px 20px;
  border: 2px solid var(--border);
  border-radius: 60px;
  background: var(--glass);
  color: white;
  font-size: 1.2rem;
  font-family: 'Amiri', serif;
  transition: 0.3s;
  backdrop-filter: blur(5px);
}
#searchInput:focus { outline: none; border-color: var(--primary-gold); box-shadow: 0 0 20px rgba(212,175,55,0.3); }

.stats-bar { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; flex-wrap: wrap; gap: 15px; }
.total-books { background: var(--glass); padding: 8px 18px; border-radius: 40px; border: 1px solid var(--border); }
.reset-btn { background: transparent; border: 1px solid var(--primary-gold); color: var(--primary-gold); padding: 8px 20px; border-radius: 40px; cursor: pointer; transition: 0.3s; font-family: inherit; }
.reset-btn:hover { background: var(--primary-gold); color: black; }

.books-grid { display: grid; gap: 25px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); margin-top: 20px; }
.book-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 20px;
  transition: 0.3s;
  display: flex;
  flex-direction: column;
}
.book-card:hover { transform: translateY(-6px); border-color: var(--primary-gold); background: rgba(212,175,55,0.08); }
.book-icon { font-size: 2.5rem; color: var(--primary-gold); margin-bottom: 10px; }
.book-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; color: #fff; line-height: 1.4; }
.book-path {
  background: rgba(0,0,0,0.3);
  padding: 8px 12px;
  border-radius: 40px;
  font-size: 0.85rem;
  margin: 12px 0 15px;
  border: 1px dashed var(--border);
  color: #ccc;
  direction: rtl;
  text-align: right;
}

.btn-group { display: flex; gap: 10px; margin-top: auto; }
.btn { flex: 1; padding: 12px; border-radius: 40px; text-decoration: none; font-weight: bold; text-align: center; font-size: 0.95rem; transition: 0.3s; }
.btn-fill { background: var(--primary-gold); color: #000; }
.btn-outline { border: 1px solid var(--primary-gold); color: var(--primary-gold); }

.loader { text-align: center; padding: 60px; grid-column: 1/-1; }
.loader i { font-size: 3rem; color: var(--primary-gold); animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

footer { text-align: center; padding: 30px; border-top: 1px solid var(--border); margin-top: 60px; opacity: 0.8; }

@media (max-width: 600px) {
  .btn-group { flex-direction: column; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo"><i class="fas fa-book-quran"></i> ہیلپ سینٹر</a>
    <a href="index.html" style="color:var(--primary-gold); text-decoration:none;"><i class="fas fa-home"></i> مرکزی صفحہ</a>
  </div>
</nav>

<main class="container">
  <div class="help-header">
    <h1>📚 کتاب تلاش کریں</h1>
    <p>تمام زمروں میں موجود PDF کتب کی تلاش</p>
  </div>

  <div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="کتاب کا نام یہاں لکھیں..." autocomplete="off">
  </div>

  <div class="stats-bar">
    <span class="total-books" id="totalCount">کتابیں: لوڈ ہو رہی ہیں...</span>
    <button class="reset-btn" id="resetSearchBtn"><i class="fas fa-redo-alt"></i> فہرست تازہ کریں</button>
  </div>

  <div id="booksContainer" class="books-grid">
    <div class="loader"><i class="fas fa-spinner"></i><br><p style="margin-top:15px">لائبریری اسکین کی جا رہی ہے، براہ کرم انتظار کریں...</p></div>
  </div>
</main>

<footer>
  <p>© 2026 اسلامک ڈیجیٹل لائبریری | جملہ حقوق محفوظ ہیں</p>
</footer>

<script>
const CONFIG = {
  API_KEY: 'AIzaSyC8GfeNEk_ugD9TG_5CGyUbwfvFQ88YJts',
  MAIN_FOLDER_ID: '1YDLO466xaB-ytUtBI9ZWk4eMfHOoX_CC',
  CACHE_KEY: 'all_books_cache_v1',
  CACHE_EXPIRY: 3600000 // 1 Hour
};

let allBooks = [];
const searchInput = document.getElementById('searchInput');
const booksContainer = document.getElementById('booksContainer');
const totalSpan = document.getElementById('totalCount');
const resetBtn = document.getElementById('resetSearchBtn');

// ریکرسیو فنکشن تمام فائلیں نکالنے کے لیے
async function fetchAllFiles(folderId, path = []) {
  let results = [];
  let pageToken = null;
  
  try {
    do {
      const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=nextPageToken,files(id,name,mimeType)&key=${CONFIG.API_KEY}&pageToken=${pageToken || ''}`;
      const response = await fetch(url);
      const data = await response.json();
      
      if (data.files) {
        for (const file of data.files) {
          if (file.mimeType === 'application/vnd.google-apps.folder') {
            // اگر فولڈر ہے تو اس کے اندر جائیں
            const subFolderFiles = await fetchAllFiles(file.id, [...path, file.name]);
            results = results.concat(subFolderFiles);
          } else if (file.name.toLowerCase().endsWith('.pdf')) {
            // اگر PDF ہے تو محفوظ کریں
            results.push({
              id: file.id,
              name: file.name,
              path: path.join(' / ') || 'مرکزی فولڈر'
            });
          }
        }
      }
      pageToken = data.nextPageToken;
    } while (pageToken);
  } catch (error) {
    console.error("Error fetching files:", error);
  }
  return results;
}

// ڈیٹا ڈسپلے کرنے کا فنکشن
function displayBooks(booksToDisplay) {
  if (booksToDisplay.length === 0) {
    booksContainer.innerHTML = '<div class="loader" style="grid-column: 1/-1">کچھ نہیں ملا۔ براہ کرم درست نام لکھیں۔</div>';
    totalSpan.innerText = `کتابیں: 0`;
    return;
  }

  // اردو حروف تہجی کے حساب سے ترتیب
  booksToDisplay.sort((a, b) => a.name.localeCompare(b.name, 'ur'));

  const html = booksToDisplay.map(book => `
    <div class="book-card">
      <div class="book-icon"><i class="fas fa-file-pdf"></i></div>
      <div class="book-title">${book.name.replace('.pdf', '')}</div>
      <div class="book-path"><i class="fas fa-folder-open"></i> ہوم / ${book.path}</div>
      <div class="btn-group">
        <a href="https://drive.google.com/file/d/${book.id}/view" target="_blank" class="btn btn-outline">مطالعہ</a>
        <a href="https://drive.google.com/uc?export=download&id=${book.id}" class="btn btn-fill">ڈاؤن لوڈ</a>
      </div>
    </div>
  `).join('');

  booksContainer.innerHTML = html;
  totalSpan.innerText = `کل کتابیں: ${booksToDisplay.length}`;
}

// مین لوڈر
async function init() {
  const cached = localStorage.getItem(CONFIG.CACHE_KEY);
  if (cached) {
    const { timestamp, data } = JSON.parse(cached);
    if (Date.now() - timestamp < CONFIG.CACHE_EXPIRY) {
      allBooks = data;
      displayBooks(allBooks);
      return;
    }
  }

  allBooks = await fetchAllFiles(CONFIG.MAIN_FOLDER_ID);
  localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({
    timestamp: Date.now(),
    data: allBooks
  }));
  displayBooks(allBooks);
}

// سرچ فنکشن
searchInput.addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase().trim();
  const filtered = allBooks.filter(book => 
    book.name.toLowerCase().includes(term) || 
    book.path.toLowerCase().includes(term)
  );
  displayBooks(filtered);
});

// ری سیٹ فنکشن
resetBtn.addEventListener('click', () => {
  localStorage.removeItem(CONFIG.CACHE_KEY);
  location.reload();
});

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
